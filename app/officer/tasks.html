<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<style>
/* ===== Task board (ported from the legacy canvas board, Lacquer & Gold skin) ===== */
.tb-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.tb-head p { color:var(--muted); font-size:.85rem; margin-top:2px; }
.tb-actions { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

.task-layout { display:flex; gap:16px; align-items:flex-start; }
.task-layout .board { flex:1 1 auto; min-width:0; }

/* ---- infinite canvas board ---- */
.board {
  position:relative; width:100%; aspect-ratio:16/9; max-height:72vh; overflow:hidden;
  border:1px solid var(--line); border-radius:14px; background:var(--surface-2);
  cursor:grab; touch-action:none; user-select:none;
}
.board.panning { cursor:grabbing; }
.board-canvas {
  position:absolute; top:0; left:0; width:8000px; height:8000px;
  transform-origin:0 0; will-change:transform;
  --grid-line: rgba(22, 49, 77, .10);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:40px 40px;
}
html.dark-mode .board-canvas { --grid-line: rgba(201, 155, 63, .10); }
.board-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.95rem; pointer-events:none; }

.zoom-controls {
  position:absolute; left:12px; bottom:12px; z-index:40;
  display:flex; align-items:center; gap:4px;
  background:var(--surface); border:1px solid var(--line); border-radius:10px;
  padding:4px 8px; box-shadow:var(--shadow-sm); font-size:.8rem;
}
.zoom-controls button {
  width:26px; height:26px; border:none; background:transparent; cursor:pointer;
  font-size:1rem; line-height:1; border-radius:6px; color:var(--text);
}
.zoom-controls button:hover { background:var(--surface-2); color:var(--gold); }
.zoom-controls #zoomLevel { min-width:42px; text-align:center; color:var(--muted); }

.board-search { position:absolute; right:12px; top:12px; z-index:40; width:220px; }
.board-search input {
  width:100%; box-sizing:border-box; padding:7px 11px; border:1px solid var(--line);
  border-radius:10px; background:var(--surface); color:var(--text); font-size:.82rem; box-shadow:var(--shadow-sm);
}
.board-search input:focus { outline:none; border-color:var(--gold); }
.search-results { margin-top:4px; background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow-lg); overflow:hidden; display:none; }
.search-results.open { display:block; }
.search-results .sr-item { padding:7px 11px; font-size:.8rem; cursor:pointer; border-bottom:1px solid var(--line); }
.search-results .sr-item:last-child { border-bottom:none; }
.search-results .sr-item:hover { background:rgba(201, 155, 63, .12); }
.search-results .sr-empty { padding:7px 11px; font-size:.78rem; color:var(--muted); }
.tcard.search-hit { box-shadow:0 0 0 3px var(--gold-bright), 0 12px 30px rgba(224, 180, 92, .35) !important; }

.minimap {
  position:absolute; right:12px; bottom:12px; z-index:40; width:256px; height:144px;
  background:var(--surface); border:1px solid var(--line); border-radius:10px;
  box-shadow:var(--shadow-sm); overflow:hidden; cursor:pointer;
}
.minimap svg { display:block; }
.minimap .mm-node { fill:var(--muted); }
.minimap .mm-node.high { fill:var(--red); } .minimap .mm-node.medium { fill:var(--warn); } .minimap .mm-node.low { fill:var(--ok); }
.minimap .mm-edge { stroke:var(--line); stroke-width:1; }
.minimap .mm-view { fill:rgba(201, 155, 63, .12); stroke:var(--gold); stroke-width:1.5; }
@media (max-width:1100px) { .minimap { display:none; } }

/* ---- task card ---- */
.tcard {
  position:absolute; z-index:2; width:240px; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; box-shadow:var(--shadow-sm); padding:12px 14px;
  cursor:grab; user-select:none; transition:box-shadow .15s;
}
.tcard.dragging { cursor:grabbing; box-shadow:var(--shadow-lg); z-index:50; opacity:.96; }
.tcard[data-priority="high"]   { border-left:4px solid var(--red); }
.tcard[data-priority="medium"] { border-left:4px solid var(--warn); }
.tcard[data-priority="low"]    { border-left:4px solid var(--ok); }
.tcard .card-head { display:flex; align-items:flex-start; gap:6px; position:relative; }
.tcard .card-head-main { display:flex; align-items:center; gap:8px; flex:1; min-width:0; flex-wrap:wrap; }
.tcard .ttl { font-weight:700; font-size:.98rem; white-space:normal; overflow-wrap:anywhere; }
.tcard .card-menu-btn { flex:0 0 auto; border:none; background:transparent; cursor:pointer; font-size:1.1rem; line-height:1; padding:2px 6px; border-radius:6px; color:var(--muted); }
.tcard .card-menu-btn:hover { background:var(--surface-2); color:var(--gold); }
.tcard .card-menu { display:none; position:absolute; top:26px; right:0; z-index:60; background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow-lg); overflow:hidden; min-width:110px; }
.tcard .card-menu.open { display:block; }
.tcard .card-menu button { display:block; width:100%; text-align:left; border:none; background:transparent; padding:8px 14px; cursor:pointer; font-size:.85rem; color:var(--text); }
.tcard .card-menu button:hover { background:var(--surface-2); }
.tcard .card-menu button.del { color:var(--red); }
.tcard .card-date { font-size:.78rem; color:var(--muted); margin:6px 0 4px; }
.tcard .card-date .muted-due { font-style:italic; opacity:.8; }
.tcard .card-toggle { display:inline-flex; align-items:center; gap:6px; border:none; background:transparent; cursor:pointer; padding:2px 0; font-size:.78rem; color:var(--gold); font-weight:600; }
.tcard .card-body { margin-top:6px; }
.tcard .card-body .desc {
  font-size:.84rem; color:var(--muted); margin-bottom:6px; white-space:pre-wrap; overflow-wrap:anywhere;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.tcard .card-body .desc.muted-due { font-style:italic; }

.status-badge { display:inline-block; padding:1px 8px; border-radius:999px; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
.status-open { background:rgba(63, 127, 191, .16); color:#6ea8d8; }
.status-in-progress { background:rgba(232, 163, 61, .16); color:#b97b18; }
.status-done { background:rgba(47, 158, 99, .16); color:var(--ok); }
html:not(.dark-mode) .status-open { color:#2a6099; }

/* roll-up progress ring on parent nodes */
.rollup { display:inline-flex; align-items:center; gap:3px; }
.rollup svg { display:block; }
.rollup .ring-bg { fill:none; stroke:var(--line); stroke-width:3; }
.rollup .ring-fg { fill:none; stroke:var(--gold); stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset .3s ease; }
.rollup.complete .ring-fg { stroke:var(--ok); }
.rollup-label { font-size:.66rem; font-weight:700; color:var(--muted); }
.rollup.complete .rollup-label { color:var(--ok); }

/* assignees */
.tcard .assignees { border-top:1px solid var(--line); margin-top:6px; padding-top:6px; }
.tcard .assignees summary { cursor:pointer; font-size:.78rem; color:var(--muted); list-style:none; display:flex; align-items:center; gap:5px; }
.tcard .assignees summary::-webkit-details-marker { display:none; }
.tcard .assignees summary .chev { transition:transform .15s; }
.tcard .assignees[open] summary .chev { transform:rotate(90deg); }
.assignee-list { margin-top:6px; display:flex; flex-direction:column; gap:4px; }
.assignee-row { display:flex; align-items:center; justify-content:space-between; font-size:.8rem; gap:6px; }
.assignee-row .x { cursor:pointer; color:var(--red); font-weight:700; padding:0 4px; }
.assignee-add { display:flex; gap:6px; margin-top:6px; }
.assignee-add select { flex:1; font-size:.78rem; padding:3px; border:1px solid var(--line); border-radius:6px; background:var(--surface); color:var(--text); }

/* connector + edges */
.tcard .connector {
  position:absolute; right:-9px; top:50%; transform:translateY(-50%);
  width:16px; height:16px; border-radius:50%; background:var(--gold); border:2px solid var(--surface);
  cursor:crosshair; z-index:5; box-shadow:var(--shadow-sm); opacity:0; transition:opacity .12s;
}
.tcard:hover .connector { opacity:1; }
.tcard.linking-source .connector { opacity:1; background:var(--red); }
.tcard.link-target-hover { outline:2px dashed var(--gold); outline-offset:2px; }
.edge-layer { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; z-index:1; }
.edge-layer .edge-line { stroke:var(--muted); stroke-width:2.5; fill:none; pointer-events:stroke; cursor:pointer; opacity:.55; transition:stroke .12s, opacity .12s; }
.edge-layer .edge-line:hover { stroke:var(--gold); opacity:1; stroke-width:3.5; }
.edge-layer .edge-hit { stroke:transparent; stroke-width:16; fill:none; pointer-events:stroke; cursor:pointer; }
.edge-layer .edge-arrow { fill:var(--muted); cursor:pointer; pointer-events:auto; transition:fill .12s; }
.edge-layer .edge-arrow:hover { fill:var(--gold); }
.edge-layer .edge-arrow.active { fill:var(--red); }
.edge-temp { stroke:var(--gold); stroke-width:2.5; stroke-dasharray:5 4; fill:none; pointer-events:none; }
.edge-menu { position:fixed; transform:translate(-50%,-50%); z-index:400; }
.edge-menu .edge-menu-del { background:var(--red); color:#fff; border:none; border-radius:8px; padding:7px 14px; font-size:.8rem; font-weight:600; cursor:pointer; box-shadow:var(--shadow-lg); white-space:nowrap; }

/* ---- right-side task list ---- */
.task-list-panel {
  flex:0 0 280px; width:280px; border:1px solid var(--line); border-radius:14px;
  background:var(--surface); padding:14px; max-height:72vh; overflow-y:auto;
}
.task-list-panel h3 { font-family:var(--serif); font-size:1rem; margin:0 0 8px; }
.task-list-panel .tl-group-title { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); margin:14px 0 6px; font-weight:700; }
.task-list-panel .tl-group-title:first-of-type { margin-top:4px; }
.tl-item { display:flex; align-items:flex-start; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); cursor:pointer; }
.tl-item:last-child { border-bottom:none; }
.tl-item:hover .tl-title { color:var(--gold); }
.tl-dot { width:9px; height:9px; border-radius:50%; margin-top:5px; flex:0 0 auto; }
.tl-dot.open { background:var(--gold); }
.tl-dot.closed { background:var(--muted); }
.tl-body { flex:1; min-width:0; }
.tl-title { font-size:.85rem; font-weight:600; line-height:1.25; transition:color .12s; }
.tl-meta { font-size:.72rem; color:var(--muted); margin-top:2px; }
.tl-empty { color:var(--muted); font-size:.8rem; padding:6px 0; }
@media (max-width:1000px){ .task-layout { flex-direction:column; } .task-list-panel { flex-basis:auto; width:100%; max-height:260px; } }

/* ---- details popup ---- */
.detpop-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:.8rem; color:var(--muted); margin-bottom:12px; }
.detpop-desc { overflow-y:auto; max-height:50vh; white-space:pre-wrap; word-break:break-word; line-height:1.55; font-size:.95rem; }
.detpop-desc.empty { color:var(--muted); font-style:italic; }

/* ---- fancy assignee checkboxes in the modal ---- */
.modal-assignee-box {
  display:flex; flex-direction:column; gap:2px; max-height:210px; overflow-y:auto; padding:6px;
  border:1px solid var(--line); border-radius:10px; background:var(--surface); scrollbar-width:thin;
}
label.modal-assignee-option {
  position:relative; display:grid; grid-template-columns:18px minmax(0,1fr); align-items:center;
  column-gap:12px; width:100%; margin:0; padding:9px 10px; border-radius:7px;
  cursor:pointer; color:var(--text); font-size:.86rem; font-weight:600; transition:background .14s ease;
}
label.modal-assignee-option:hover { background:var(--surface-2); }
label.modal-assignee-option:has(input:checked) { background:rgba(201, 155, 63, .12); }
label.modal-assignee-option input[type="checkbox"] {
  position:absolute; width:1px; height:1px; margin:0; padding:0; opacity:0; pointer-events:none;
  overflow:hidden; clip:rect(0 0 0 0); clip-path:inset(50%); white-space:nowrap;
}
.modal-assignee-check {
  position:relative; display:block; grid-column:1; width:18px; height:18px;
  border:1.5px solid var(--muted); border-radius:5px; background:var(--surface);
  transition:background .14s ease, border-color .14s ease, transform .14s ease;
}
.modal-assignee-check::after {
  content:''; position:absolute; left:5px; top:2px; width:5px; height:9px;
  border:solid #fff; border-width:0 2px 2px 0;
  transform:rotate(45deg) scale(.7); opacity:0; transition:opacity .12s ease, transform .12s ease;
}
label.modal-assignee-option:hover .modal-assignee-check { border-color:var(--gold); }
label.modal-assignee-option input:checked + .modal-assignee-check { background:var(--gold); border-color:var(--gold); }
label.modal-assignee-option input:checked + .modal-assignee-check::after { opacity:1; transform:rotate(45deg) scale(1); }
label.modal-assignee-option:active .modal-assignee-check { transform:scale(.94); }
.modal-assignee-empty { color:var(--muted); font-size:.8rem; padding:10px; text-align:center; }

/* ===== Kanban view ===== */
.kanban { display:none; width:100%; position:relative; }
body.kanban-mode .board, body.kanban-mode .task-list-panel { display:none; }
body.kanban-mode .task-layout { display:block; width:100%; }
body.kanban-mode .kanban { display:block; }

.kanban-col {
  min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:16px;
  background:var(--surface); box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column; height:clamp(480px, 64vh, 720px);
}
.kanban-col::before { content:''; display:block; height:4px; background:var(--col-accent); }
.kanban-col[data-col="main"]        { --col-accent:var(--gold); --col-soft:rgba(201, 155, 63, .14); --col-ink:var(--gold); }
.kanban-col[data-col="open"]        { --col-accent:#3f7fbf; --col-soft:rgba(63, 127, 191, .14); --col-ink:#6ea8d8; }
.kanban-col[data-col="in-progress"] { --col-accent:var(--warn); --col-soft:rgba(232, 163, 61, .14); --col-ink:#b97b18; }
.kanban-col[data-col="done"]        { --col-accent:var(--ok); --col-soft:rgba(47, 158, 99, .14); --col-ink:var(--ok); }
html:not(.dark-mode) .kanban-col[data-col="open"] { --col-ink:#2a6099; }
.kanban-main-col { height:auto; min-height:0; margin:0 0 16px; }
.kanban-main-col .kanban-col-body { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:12px; overflow:visible; min-height:100px; }
.kanban-main-col .kanban-col-body:empty::after { grid-column:1 / -1; }
.kanban-columns { display:grid; grid-template-columns:repeat(3, minmax(260px, 1fr)); gap:14px; align-items:start; }
.kanban-col-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 15px 12px; border-bottom:1px solid var(--line); }
.kanban-col-heading { display:flex; align-items:center; gap:10px; min-width:0; }
.kanban-col-icon { width:32px; height:32px; border-radius:10px; display:grid; place-items:center; color:var(--col-ink); background:var(--col-soft); font-size:.9rem; font-weight:900; }
.kanban-col-copy strong { display:block; font-size:.93rem; line-height:1.1; }
.kanban-col-copy small { display:block; color:var(--muted); margin-top:3px; font-size:.7rem; }
.kanban-col-count { min-width:28px; height:25px; padding:0 9px; display:inline-grid; place-items:center; border-radius:999px; color:var(--col-ink); background:var(--col-soft); font-size:.74rem; font-weight:800; }
.kanban-col-body { flex:1; min-height:90px; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; }
.kanban-col-body:empty::after {
  content:'Drop a task here'; min-height:84px; border:1.5px dashed var(--line); border-radius:12px;
  display:grid; place-items:center; color:var(--muted); font-size:.78rem; font-weight:600;
}
.kanban-col.drop-hover { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201, 155, 63, .14), var(--shadow-lg); }

.kcard {
  --priority:var(--warn); position:relative; overflow:hidden; flex:0 0 auto;
  border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:12px 12px 11px;
  cursor:grab; box-shadow:var(--shadow-sm); transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
}
.kcard::before { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:var(--priority); }
.kcard[data-priority="high"] { --priority:var(--red); }
.kcard[data-priority="low"] { --priority:var(--ok); }
.kcard:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.kcard:active { cursor:grabbing; }
.kcard.dragging { opacity:.45; transform:rotate(1deg) scale(.985); }
.kcard.kroot { border-color:rgba(201, 155, 63, .5); }
.kcard-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding-left:3px; }
.kcard-title-row { display:flex; align-items:flex-start; flex:1; min-width:0; gap:7px; }
.kcard-parent-badge { flex:0 0 auto; margin-top:1px; padding:3px 7px; border-radius:999px; color:var(--gold); background:rgba(201, 155, 63, .14); font-size:.54rem; font-weight:900; letter-spacing:.07em; line-height:1.1; }
.kcard-title { flex:1; min-width:0; padding-right:4px; font-size:.9rem; font-weight:700; line-height:1.28; overflow-wrap:anywhere; }
.kcard-actions { display:flex; align-items:center; gap:5px; flex:0 0 auto; }
.kcard-edit, .kcard-toggle {
  flex:0 0 auto; display:grid; place-items:center; border:none; border-radius:8px;
  color:var(--muted); background:var(--surface); cursor:pointer; transition:color .15s, background .15s, transform .16s;
}
.kcard-edit { width:28px; height:28px; }
.kcard-edit svg { width:14px; height:14px; display:block; pointer-events:none; }
.kcard-edit:hover, .kcard-toggle:hover { color:var(--gold); }
.kcard-toggle { width:26px; height:26px; font-size:.76rem; line-height:1; }
.kcard-toggle.open { transform:rotate(90deg); }
.kcard-meta { display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:9px; padding-left:3px; }
.kcard-chip { display:inline-flex; align-items:center; gap:4px; min-height:22px; padding:3px 7px; border-radius:7px; color:var(--muted); background:var(--surface); font-size:.66rem; font-weight:700; }
.kcard-chip.priority { text-transform:capitalize; }
.kcard-chip.overdue { color:var(--red); background:rgba(200, 32, 47, .12); }
.kcard-parent { display:flex; align-items:center; gap:6px; margin:8px 0 0 3px; padding:6px 8px; border-radius:8px; color:var(--muted); background:var(--surface); font-size:.68rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kcard-parent span { overflow:hidden; text-overflow:ellipsis; }
.kcard-desc { display:none; margin:9px 0 0 3px; padding:9px 1px 1px; border-top:1px solid var(--line); color:var(--muted); font-size:.76rem; line-height:1.45; white-space:pre-wrap; overflow-wrap:anywhere; }
.kcard-desc.open { display:block; }
.kcard-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px; padding:9px 0 0 3px; border-top:1px solid var(--line); }
.kcard-assignees { display:flex; align-items:center; min-width:0; }
.kavatar {
  width:25px; height:25px; margin-left:-5px; border:2px solid var(--surface-2); border-radius:50%;
  display:grid; place-items:center; color:#fff; background:linear-gradient(140deg, #d42a3a, var(--red-deep, #8f1622));
  font-size:.58rem; font-weight:900; letter-spacing:.02em;
}
.kavatar:first-child { margin-left:0; }
.kavatar.more { color:var(--muted); background:var(--surface); }
.kcard-unassigned { color:var(--muted); font-size:.66rem; font-weight:600; }
.kcard-id { color:var(--muted); opacity:.7; font-size:.62rem; font-weight:700; }
@media (max-width:900px) { .kanban-columns { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; } .kanban-columns .kanban-col { flex:0 0 min(86vw, 320px); scroll-snap-align:start; } .kanban-main-col .kanban-col-body { grid-template-columns:1fr; } }
@media (prefers-reduced-motion:reduce) { .kcard, .kcard-toggle { transition:none; } }

/* ===== List view ===== */
.listview { display:none; }
body.list-mode .board, body.list-mode .task-list-panel { display:none; }
body.list-mode .task-layout { display:block; width:100%; }
body.list-mode .listview { display:block; }
.listview .lv-card { border:1px solid var(--line); border-radius:16px; background:var(--surface); box-shadow:var(--shadow-sm); padding:16px; }
.listview th { cursor:pointer; user-select:none; white-space:nowrap; }
.listview th:hover { color:var(--gold); }
.listview th .dir { font-size:.7rem; margin-left:3px; }
.listview .status-badge { border:none; font:inherit; font-size:.68rem; font-weight:700; cursor:pointer; }
.listview .status-badge:hover { filter:brightness(1.15); }
.listview .lv-title { cursor:pointer; }
.listview .lv-title:hover { color:var(--gold); }
.listview td.due-overdue { color:var(--red); font-weight:700; }

/* overdue on the canvas */
.tcard.overdue { box-shadow:0 0 0 2px rgba(200, 32, 47, .55), var(--shadow-sm); }
.tcard.overdue .card-date { color:var(--red); font-weight:700; }
.tcard .status-badge { cursor:pointer; }
.tcard .status-badge:hover { filter:brightness(1.15); }
.tl-meta.overdue { color:var(--red); font-weight:600; }

/* toast */
.tb-toast {
  position:fixed; left:50%; bottom:28px; transform:translate(-50%, 12px); z-index:500;
  background:var(--surface); color:var(--text); border:1px solid rgba(201, 155, 63, .5);
  border-radius:10px; padding:10px 18px; font-size:.86rem; font-weight:600;
  box-shadow:var(--shadow-lg); opacity:0; transition:opacity .25s, transform .25s; pointer-events:none;
}
.tb-toast.show { opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>
<div class="loading" id="loading">Loading task board…</div>
<script type="module">
  import { requireOfficer } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';

  const GRID = 40;
  const ctx = await requireOfficer();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'Tasks');

  const STATUSES = ['open', 'in-progress', 'done'];
  let TASKS = [], EDGES = [], ASSIGNEES = [], OFFICERS = [];
  let HIDE_DONE = false;
  try { HIDE_DONE = localStorage.getItem('vsa-tasks-hide-done') === '1'; } catch (e) {}
  const esc = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const snap = (v) => Math.max(0, Math.round(v / GRID) * GRID);
  const statusClass = (s) => 'status-' + (s || 'open').replace(/[^a-z-]/g, '');
  const statusLabel = (s) => (s || 'open').replace('-', ' ');
  const isOverdue = (t) => !!t.due_date && t.status !== 'done' && t.due_date < new Date().toLocaleDateString('en-CA');
  const visibleTasks = () => HIDE_DONE ? TASKS.filter(t => t.status !== 'done') : TASKS;
  const assigneesOf = (taskId) => ASSIGNEES.filter(a => a.task_id === taskId)
    .map(a => ({ user_id: a.user_id, name: OFFICERS.find(o => o.id === a.user_id)?.full_name || 'Member' }));

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'tb-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2600);
  }
  function confirmDialog(msg) {
    return new Promise(res => {
      const back = document.createElement('div');
      back.className = 'modal-back';
      back.innerHTML = `<div class="modal" style="max-width:380px">
        <h2>Are you sure?</h2>
        <p style="color:var(--muted); margin-bottom:6px">${msg}</p>
        <div class="row-btns"><button class="btn ghost" id="cd-no">Cancel</button><button class="btn" id="cd-yes">Delete</button></div>
      </div>`;
      document.body.appendChild(back);
      const done = (v) => { back.remove(); res(v); };
      back.querySelector('#cd-no').onclick = () => done(false);
      back.querySelector('#cd-yes').onclick = () => done(true);
      back.addEventListener('click', (e) => { if (e.target === back) done(false); });
    });
  }

  // ---------- layout ----------
  page.innerHTML = `
    <div class="tb-head">
      <div>
        <h2 style="margin-bottom:2px">Task board</h2>
        <p>Drag cards to organize — they snap to the grid and the layout saves. Drag empty space to pan, scroll to zoom, and pull the gold dot on a card onto another to link them.</p>
      </div>
      <div class="tb-actions">
        <button class="chip-btn" id="hideDoneBtn" title="Hide finished tasks on the grid">Hide done</button>
        <div class="mode-toggle" id="viewToggle">
          <button type="button" data-view="grid" class="on">Grid</button>
          <button type="button" data-view="kanban">Kanban</button>
          <button type="button" data-view="list">List</button>
        </div>
        <button class="btn" id="newTaskBtn">+ New task</button>
      </div>
    </div>
    <div class="task-layout">
      <aside class="task-list-panel" id="taskListPanel">
        <h3>All Tasks</h3>
        <div id="taskListBody"><div class="tl-empty">Loading…</div></div>
      </aside>
      <div class="board" id="board">
        <div class="board-canvas" id="boardCanvas"><svg class="edge-layer" id="edgeLayer" width="8000" height="8000"></svg></div>
        <div class="board-empty" id="boardEmpty">No tasks yet. Click "New task" to add one.</div>
        <div class="zoom-controls">
          <button type="button" id="zoomInBtn" title="Zoom in">+</button>
          <button type="button" id="zoomOutBtn" title="Zoom out">−</button>
          <button type="button" id="zoomFitBtn" title="Fit to screen">⛶</button>
          <span id="zoomLevel">100%</span>
        </div>
        <div class="board-search">
          <input type="text" id="boardSearch" placeholder="Search tasks…" autocomplete="off">
          <div class="search-results" id="searchResults"></div>
        </div>
        <div class="minimap" id="minimap"><svg id="minimapSvg" width="256" height="144" viewBox="0 0 256 144"></svg></div>
      </div>
      <div class="kanban" id="kanban">
        <section class="kanban-col kanban-main-col" data-col="main">
          <div class="kanban-col-head"><div class="kanban-col-heading"><span class="kanban-col-icon">◆</span><span class="kanban-col-copy"><strong>Main</strong><small>Parent tasks with sub-tasks</small></span></div><span class="kanban-col-count" data-count="main">0</span></div>
          <div class="kanban-col-body" data-status="main"></div>
        </section>
        <div class="kanban-columns">
          <section class="kanban-col" data-col="open">
            <div class="kanban-col-head"><div class="kanban-col-heading"><span class="kanban-col-icon">○</span><span class="kanban-col-copy"><strong>Open</strong><small>Ready to be worked on</small></span></div><span class="kanban-col-count" data-count="open">0</span></div>
            <div class="kanban-col-body" data-status="open"></div>
          </section>
          <section class="kanban-col" data-col="in-progress">
            <div class="kanban-col-head"><div class="kanban-col-heading"><span class="kanban-col-icon">◐</span><span class="kanban-col-copy"><strong>In Progress</strong><small>Actively being completed</small></span></div><span class="kanban-col-count" data-count="in-progress">0</span></div>
            <div class="kanban-col-body" data-status="in-progress"></div>
          </section>
          <section class="kanban-col" data-col="done">
            <div class="kanban-col-head"><div class="kanban-col-heading"><span class="kanban-col-icon">✓</span><span class="kanban-col-copy"><strong>Done</strong><small>Completed and closed</small></span></div><span class="kanban-col-count" data-count="done">0</span></div>
            <div class="kanban-col-body" data-status="done"></div>
          </section>
        </div>
      </div>
      <div class="listview" id="listView"><div class="lv-card">
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr>
            <th data-sort="title">Task<span class="dir"></span></th>
            <th data-sort="status">Status<span class="dir"></span></th>
            <th data-sort="priority">Priority<span class="dir"></span></th>
            <th data-sort="due">Due<span class="dir"></span></th>
            <th>Assignees</th>
            <th></th>
          </tr></thead>
          <tbody id="lv-body"></tbody>
        </table></div>
      </div></div>
    </div>

    <div class="modal-back" id="detpopOverlay" style="display:none">
      <div class="modal" role="dialog" aria-modal="true">
        <div style="display:flex; align-items:flex-start; gap:12px; margin-bottom:6px">
          <h2 id="detpopTitle" style="flex:1; word-break:break-word"></h2>
          <button type="button" class="btn sm ghost" id="detpopClose" aria-label="Close">✕</button>
        </div>
        <div class="detpop-meta" id="detpopMeta"></div>
        <div class="detpop-desc" id="detpopDesc"></div>
      </div>
    </div>

    <div class="modal-back" id="overlay" style="display:none">
      <div class="modal">
        <h2 id="modalTitle">New task</h2>
        <div class="notice" id="formErr"></div>
        <input type="hidden" id="taskId">
        <div class="field"><label>Title</label><input id="fTitle" maxlength="255" placeholder="Task title"></div>
        <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Optional details"></textarea></div>
        <div class="field-row">
          <div class="field"><label>Due date</label><input type="date" id="fDue"></div>
          <div class="field"><label>Status</label>
            <select id="fStatus"><option value="open">Open</option><option value="in-progress">In progress</option><option value="done">Done</option></select>
          </div>
          <div class="field"><label>Priority</label>
            <select id="fPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
          </div>
        </div>
        <div class="field"><label>Assigned officers</label>
          <div class="modal-assignee-box" id="fAssignees"><div class="modal-assignee-empty">No officers available.</div></div>
        </div>
        <div class="row-btns">
          <button class="btn ghost" id="cancelBtn" type="button">Cancel</button>
          <button class="btn" id="saveBtn" type="button">Save</button>
        </div>
      </div>
    </div>`;

  // modal-back is display:flex in app.css; we toggle via inline display
  const overlay = document.getElementById('overlay');
  const detpop = document.getElementById('detpopOverlay');

  // ---------- data ----------
  async function fetchAll() {
    const [t, e, a, p] = await Promise.all([
      supabase.from('tasks').select('*').order('created_at'),
      supabase.from('task_edges').select('*'),
      supabase.from('task_assignees').select('*'),
      supabase.from('profiles').select('id, full_name').order('full_name'),
    ]);
    return { tasks: t.data || [], edges: e.data || [], assignees: a.data || [], officers: p.data || [] };
  }
  async function load() {
    const d = await fetchAll();
    TASKS = d.tasks; EDGES = d.edges; ASSIGNEES = d.assignees; OFFICERS = d.officers;
    renderBoard(); renderTaskList(); renderKanban(); renderListView();
  }

  // ---------- camera (pan/zoom) ----------
  let CAM = { x: 0, y: 0, scale: 1 };
  const MIN_SCALE = 0.3, MAX_SCALE = 2.5;
  try { const saved = JSON.parse(localStorage.getItem('vsa-task-cam') || 'null'); if (saved && typeof saved.scale === 'number') CAM = saved; } catch (e) {}
  function applyCam() {
    const c = document.getElementById('boardCanvas');
    if (!c) return;
    c.style.transform = `translate(${CAM.x}px,${CAM.y}px) scale(${CAM.scale})`;
    document.getElementById('zoomLevel').textContent = Math.round(CAM.scale * 100) + '%';
    renderMinimap();
  }
  const saveCam = () => { try { localStorage.setItem('vsa-task-cam', JSON.stringify(CAM)); } catch (e) {} };
  const clampScale = (s) => Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));
  function zoomAt(factor, cx, cy) {
    const r = document.getElementById('board').getBoundingClientRect();
    const px = (cx == null ? r.width / 2 : cx - r.left);
    const py = (cy == null ? r.height / 2 : cy - r.top);
    const ns = clampScale(CAM.scale * factor);
    const k = ns / CAM.scale;
    CAM.x = px - (px - CAM.x) * k;
    CAM.y = py - (py - CAM.y) * k;
    CAM.scale = ns;
    applyCam(); saveCam();
  }
  function fitToView() {
    const board = document.getElementById('board');
    if (!TASKS.length) { CAM = { x: 0, y: 0, scale: 1 }; applyCam(); saveCam(); return; }
    let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
    TASKS.forEach(t => {
      const x = t.pos_x || 40, y = t.pos_y || 40;
      minx = Math.min(minx, x); miny = Math.min(miny, y);
      maxx = Math.max(maxx, x + 260); maxy = Math.max(maxy, y + 200);
    });
    const r = board.getBoundingClientRect(), pad = 60;
    const ns = clampScale(Math.min((r.width - pad * 2) / Math.max(1, maxx - minx), (r.height - pad * 2) / Math.max(1, maxy - miny), 1.2));
    CAM.scale = ns;
    CAM.x = pad - minx * ns + (r.width - pad * 2 - (maxx - minx) * ns) / 2;
    CAM.y = pad - miny * ns + (r.height - pad * 2 - (maxy - miny) * ns) / 2;
    applyCam(); saveCam();
  }
  function flyToTask(taskId, targetScale) {
    const t = TASKS.find(x => x.id === taskId);
    if (!t) return;
    const board = document.getElementById('board');
    const nx = (t.pos_x || 40) + 120, ny = (t.pos_y || 40) + 48;
    const s = clampScale(targetScale || Math.max(CAM.scale, 1));
    CAM.scale = s;
    CAM.x = board.clientWidth / 2 - nx * s;
    CAM.y = board.clientHeight / 2 - ny * s;
    applyCam(); saveCam();
    const card = document.querySelector(`.tcard[data-id="${taskId}"]`);
    if (card) { card.classList.add('search-hit'); setTimeout(() => card.classList.remove('search-hit'), 1600); }
  }

  // ---------- minimap ----------
  function renderMinimap() {
    const svg = document.getElementById('minimapSvg');
    if (!svg) return;
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const shown = visibleTasks();
    if (!shown.length) return;
    const NS = 'http://www.w3.org/2000/svg';
    const board = document.getElementById('board');
    let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
    shown.forEach(t => {
      const x = t.pos_x || 40, y = t.pos_y || 40;
      minx = Math.min(minx, x); miny = Math.min(miny, y);
      maxx = Math.max(maxx, x + 240); maxy = Math.max(maxy, y + 96);
    });
    const pad = 60; minx -= pad; miny -= pad; maxx += pad; maxy += pad;
    const bw = maxx - minx, bh = maxy - miny, MW = 256, MH = 144;
    const k = Math.min(MW / bw, MH / bh);
    const offx = (MW - bw * k) / 2, offy = (MH - bh * k) / 2;
    const mmx = (x) => (x - minx) * k + offx, mmy = (y) => (y - miny) * k + offy;
    svg.dataset.minx = minx; svg.dataset.miny = miny; svg.dataset.k = k; svg.dataset.offx = offx; svg.dataset.offy = offy;
    EDGES.forEach(e => {
      const a = shown.find(t => t.id === e.from_id), b = shown.find(t => t.id === e.to_id);
      if (!a || !b) return;
      const ln = document.createElementNS(NS, 'line');
      ln.setAttribute('class', 'mm-edge');
      ln.setAttribute('x1', mmx((a.pos_x || 40) + 120)); ln.setAttribute('y1', mmy((a.pos_y || 40) + 48));
      ln.setAttribute('x2', mmx((b.pos_x || 40) + 120)); ln.setAttribute('y2', mmy((b.pos_y || 40) + 48));
      svg.appendChild(ln);
    });
    shown.forEach(t => {
      const r = document.createElementNS(NS, 'rect');
      r.setAttribute('class', 'mm-node ' + (t.priority || 'medium'));
      r.setAttribute('x', mmx(t.pos_x || 40)); r.setAttribute('y', mmy(t.pos_y || 40));
      r.setAttribute('width', Math.max(3, 240 * k)); r.setAttribute('height', Math.max(2, 96 * k));
      r.setAttribute('rx', 1.5);
      svg.appendChild(r);
    });
    const vx = -CAM.x / CAM.scale, vy = -CAM.y / CAM.scale;
    const vw = board.clientWidth / CAM.scale, vh = board.clientHeight / CAM.scale;
    const vr = document.createElementNS(NS, 'rect');
    vr.setAttribute('class', 'mm-view');
    vr.setAttribute('x', mmx(vx)); vr.setAttribute('y', mmy(vy));
    vr.setAttribute('width', Math.max(4, vw * k)); vr.setAttribute('height', Math.max(4, vh * k));
    vr.setAttribute('rx', 2);
    svg.appendChild(vr);
  }
  function minimapPanTo(evt) {
    const svg = document.getElementById('minimapSvg');
    if (!svg || !svg.dataset.k) return;
    const r = svg.getBoundingClientRect();
    const minx = +svg.dataset.minx, miny = +svg.dataset.miny, k = +svg.dataset.k, offx = +svg.dataset.offx, offy = +svg.dataset.offy;
    const cx = (evt.clientX - r.left - offx) / k + minx, cy = (evt.clientY - r.top - offy) / k + miny;
    const board = document.getElementById('board');
    CAM.x = board.clientWidth / 2 - cx * CAM.scale;
    CAM.y = board.clientHeight / 2 - cy * CAM.scale;
    applyCam(); saveCam();
  }

  // ---------- board cards ----------
  function taskProgress(taskId) {
    const childIds = EDGES.filter(e => e.from_id === taskId).map(e => e.to_id);
    if (!childIds.length) return null;
    const done = childIds.filter(cid => TASKS.find(t => t.id === cid)?.status === 'done').length;
    return { done, total: childIds.length };
  }
  function progressRingHTML(p) {
    if (!p) return '';
    const R = 9, C = 2 * Math.PI * R;
    const off = C * (1 - (p.total ? p.done / p.total : 0));
    return `<span class="rollup${p.done === p.total ? ' complete' : ''}" title="${p.done} of ${p.total} sub-tasks done">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <circle class="ring-bg" cx="12" cy="12" r="${R}"></circle>
        <circle class="ring-fg" cx="12" cy="12" r="${R}" stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 12 12)"></circle>
      </svg><span class="rollup-label">${p.done}/${p.total}</span></span>`;
  }
  function officerOptions(task) {
    const assignedIds = new Set(assigneesOf(task.id).map(a => a.user_id));
    const avail = OFFICERS.filter(o => !assignedIds.has(o.id));
    if (!avail.length) return '';
    return `<div class="assignee-add"><select data-add="${task.id}"><option value="">+ Assign officer…</option>${
      avail.map(o => `<option value="${o.id}">${esc(o.full_name)}</option>`).join('')}</select></div>`;
  }
  function renderCard(task) {
    const el = document.createElement('div');
    el.className = 'tcard' + (isOverdue(task) ? ' overdue' : '');
    el.style.left = (task.pos_x || 40) + 'px';
    el.style.top = (task.pos_y || 40) + 'px';
    el.dataset.id = task.id;
    el.dataset.priority = task.priority || 'medium';
    const who = assigneesOf(task.id);
    const due = task.due_date ? `<span>📅 ${esc(task.due_date)}${isOverdue(task) ? ' — overdue' : ''}</span>` : '<span class="muted-due">No due date</span>';
    const aRows = who.map(a =>
      `<div class="assignee-row"><span>${esc(a.name)}</span><span class="x" data-unassign="${task.id}" data-uid="${a.user_id}">✕</span></div>`
    ).join('') || '<div class="assignee-row" style="color:var(--muted)">No one assigned</div>';
    el.innerHTML = `
      <div class="card-head">
        <div class="card-head-main">
          <span class="ttl">${esc(task.title)}</span>
          <span class="status-badge ${statusClass(task.status)}" data-cycle="${task.id}" title="Click to change status">${esc(statusLabel(task.status))}</span>
          ${progressRingHTML(taskProgress(task.id))}
        </div>
        <button class="card-menu-btn" data-menu="${task.id}" title="More" aria-label="More">⋮</button>
        <div class="card-menu" data-menufor="${task.id}">
          <button data-edit="${task.id}">Edit</button>
          <button class="del" data-del="${task.id}">Delete</button>
        </div>
      </div>
      <div class="card-date">${due}</div>
      <button class="card-toggle" data-toggle="${task.id}">▸ Show details</button>
      <div class="card-body">
        ${task.description ? `<div class="desc">${esc(task.description)}</div>` : '<div class="desc muted-due">No description</div>'}
        <details class="assignees"><summary><span class="chev">▸</span> Assigned (${who.length})</summary>
          <div class="assignee-list">${aRows}</div>${officerOptions(task)}
        </details>
      </div>`;
    const conn = document.createElement('div');
    conn.className = 'connector';
    conn.title = 'Drag to link to another task';
    el.appendChild(conn);
    attachConnector(conn, el, task);
    attachDrag(el);
    return el;
  }

  function renderTaskList() {
    const body = document.getElementById('taskListBody');
    if (!body) return;
    const byDue = (a, b) => (a.due_date || '9999') < (b.due_date || '9999') ? -1
      : (a.due_date || '9999') > (b.due_date || '9999') ? 1 : 0;
    const active = TASKS.filter(t => (t.status || 'open') !== 'done').sort(byDue);
    const closed = TASKS.filter(t => (t.status || 'open') === 'done').sort(byDue);
    const row = (t) => {
      const who = assigneesOf(t.id).map(a => a.name).join(', ') || 'Unassigned';
      const late = isOverdue(t);
      const due = t.due_date ? ` · due ${esc(t.due_date)}${late ? ' (overdue)' : ''}` : '';
      return `<div class="tl-item" data-fly="${t.id}">
        <span class="tl-dot ${(t.status || 'open') !== 'done' ? 'open' : 'closed'}"></span>
        <div class="tl-body"><div class="tl-title">${esc(t.title || '(untitled)')}</div>
        <div class="tl-meta${late ? ' overdue' : ''}">${statusLabel(t.status)}${due} · ${esc(who)}</div></div></div>`;
    };
    body.innerHTML =
      `<div class="tl-group-title">Active (${active.length})</div>` +
      (active.length ? active.map(row).join('') : '<div class="tl-empty">No active tasks.</div>') +
      `<div class="tl-group-title">Closed (${closed.length})</div>` +
      (closed.length ? closed.map(row).join('') : '<div class="tl-empty">No closed tasks.</div>');
  }

  function renderBoard() {
    const canvas = document.getElementById('boardCanvas');
    canvas.querySelectorAll('.tcard').forEach(c => c.remove());
    document.getElementById('boardEmpty').style.display = TASKS.length ? 'none' : 'flex';
    visibleTasks().forEach(t => canvas.appendChild(renderCard(t)));
    renderEdges();
    applyCam();
  }

  // ---------- edges ----------
  function nodeCenter(taskId) {
    const el = document.querySelector(`.tcard[data-id="${taskId}"]`);
    if (el) {
      const x = parseInt(el.style.left, 10) || 0, y = parseInt(el.style.top, 10) || 0;
      return { x: x + el.offsetWidth / 2, y: y + el.offsetHeight / 2 };
    }
    const t = TASKS.find(t => t.id === taskId);
    return t ? { x: (t.pos_x || 40) + 120, y: (t.pos_y || 40) + 45 } : null;
  }
  const edgePath = (a, b) => {
    const dx = (b.x - a.x) * 0.5;
    return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y} ${b.x - dx} ${b.y} ${b.x} ${b.y}`;
  };
  function renderEdges() {
    const svg = document.getElementById('edgeLayer');
    if (!svg) return;
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const NS = 'http://www.w3.org/2000/svg';
    EDGES.forEach(edge => {
      // only draw edges whose cards are both on the board (hide-done can remove one)
      if (!document.querySelector(`.tcard[data-id="${edge.from_id}"]`)
        || !document.querySelector(`.tcard[data-id="${edge.to_id}"]`)) return;
      const a = nodeCenter(edge.from_id), b = nodeCenter(edge.to_id);
      if (!a || !b) return;
      const d = edgePath(a, b);
      const hit = document.createElementNS(NS, 'path');
      hit.setAttribute('class', 'edge-hit'); hit.setAttribute('d', d); hit.dataset.edgeId = edge.id;
      const line = document.createElementNS(NS, 'path');
      line.setAttribute('class', 'edge-line'); line.setAttribute('d', d); line.dataset.edgeId = edge.id;
      svg.appendChild(hit); svg.appendChild(line);
      const _dx = (b.x - a.x) * 0.5;
      const P0 = a, P1 = { x: a.x + _dx, y: a.y }, P2 = { x: b.x - _dx, y: b.y }, P3 = b;
      const mx = (P0.x + 3 * P1.x + 3 * P2.x + P3.x) / 8;
      const my = (P0.y + 3 * P1.y + 3 * P2.y + P3.y) / 8;
      const ang = Math.atan2(-0.75 * P0.y - 0.75 * P1.y + 0.75 * P2.y + 0.75 * P3.y,
                             -0.75 * P0.x - 0.75 * P1.x + 0.75 * P2.x + 0.75 * P3.x) * 180 / Math.PI;
      const arrow = document.createElementNS(NS, 'path');
      arrow.setAttribute('class', 'edge-arrow');
      arrow.setAttribute('d', 'M -7 -7 L 8 0 L -7 7 L -3 0 Z');
      arrow.dataset.edgeId = edge.id;
      arrow.dataset.mx = mx; arrow.dataset.my = my; arrow.dataset.flowAngle = ang;
      arrow.setAttribute('transform', `translate(${mx},${my}) rotate(${ang})`);
      svg.appendChild(arrow);
    });
    if (window.__edgeMenu && window.__edgeMenu.edgeId) {
      if (!EDGES.some(e => e.id === window.__edgeMenu.edgeId)) closeEdgeMenu();
      else aimArrowAtMenu();
    }
  }

  // ---------- drag-to-connect ----------
  let LINKING = null;
  function clientToCanvas(cx, cy) {
    const r = document.getElementById('board').getBoundingClientRect();
    return { x: (cx - r.left - CAM.x) / CAM.scale, y: (cy - r.top - CAM.y) / CAM.scale };
  }
  function canvasToClient(x, y) {
    const r = document.getElementById('board').getBoundingClientRect();
    return { x: x * CAM.scale + CAM.x + r.left, y: y * CAM.scale + CAM.y + r.top };
  }
  function attachConnector(conn, cardEl, task) {
    conn.addEventListener('pointerdown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const svg = document.getElementById('edgeLayer');
      const temp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      temp.setAttribute('class', 'edge-temp');
      svg.appendChild(temp);
      LINKING = { fromId: task.id, temp };
      cardEl.classList.add('linking-source');
      try { conn.setPointerCapture(e.pointerId); } catch (_) {}
    });
    conn.addEventListener('pointermove', (e) => {
      if (!LINKING) return;
      const a = nodeCenter(LINKING.fromId);
      if (a) LINKING.temp.setAttribute('d', edgePath(a, clientToCanvas(e.clientX, e.clientY)));
      document.querySelectorAll('.tcard.link-target-hover').forEach(c => c.classList.remove('link-target-hover'));
      const tgt = document.elementFromPoint(e.clientX, e.clientY)?.closest('.tcard');
      if (tgt && +tgt.dataset.id !== LINKING.fromId) tgt.classList.add('link-target-hover');
    });
    conn.addEventListener('pointerup', async (e) => {
      if (!LINKING) return;
      const link = LINKING; LINKING = null;
      link.temp?.parentNode?.removeChild(link.temp);
      cardEl.classList.remove('linking-source');
      document.querySelectorAll('.tcard.link-target-hover').forEach(c => c.classList.remove('link-target-hover'));
      const tgt = document.elementFromPoint(e.clientX, e.clientY)?.closest('.tcard');
      if (!tgt) return;
      const toId = +tgt.dataset.id;
      if (!toId || toId === link.fromId) return;
      if (EDGES.some(x => x.from_id === link.fromId && x.to_id === toId)) return; // already linked
      if (wouldCycle(link.fromId, toId)) { toast('That link would create a loop — not allowed.'); return; }
      const { error } = await supabase.from('task_edges').insert({ from_id: link.fromId, to_id: toId });
      if (!error) {
        const { data } = await supabase.from('task_edges').select('*');
        EDGES = data || EDGES;
        renderBoard(); renderKanban();
      }
    });
  }
  // walking downstream from `to`: if we can reach `from`, the new link closes a loop
  function wouldCycle(fromId, toId) {
    const seen = new Set([toId]);
    const queue = [toId];
    while (queue.length) {
      const cur = queue.shift();
      if (cur === fromId) return true;
      EDGES.filter(e => e.from_id === cur).forEach(e => {
        if (!seen.has(e.to_id)) { seen.add(e.to_id); queue.push(e.to_id); }
      });
    }
    return false;
  }

    if (!window.__edgeMenu || !document.getElementById('edgeMenu')) return;

    if (!ar) return;
    const mx = +ar.dataset.mx, my = +ar.dataset.my, mc = window.__edgeMenu.canvas;

    const perp = (fa + 90) * Math.PI / 180, off = 46;
    const cand1 = { x: mx + Math.cos(perp) * off, y: my + Math.sin(perp) * off };
    const cand2 = { x: mx - Math.cos(perp) * off, y: my - Math.sin(perp) * off };
    const s1 = canvasToClient(cand1.x, cand1.y), s2 = canvasToClient(cand2.x, cand2.y);
    const room = (p) => Math.min(p.x, innerWidth - p.x) + Math.min(p.y, innerHeight - p.y);
    const pickCanvas = room(s1) >= room(s2) ? cand1 : cand2;
    const screen = canvasToClient(pickCanvas.x, pickCanvas.y);

  // ---------- pan & zoom wiring ----------
  (function setupCanvas() {
    const board = document.getElementById('board');
    board.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoomAt(e.deltaY < 0 ? 1.12 : 1 / 1.12, e.clientX, e.clientY);

      const p = clientToCanvas(e.clientX, e.clientY);
      openModal(null, { x: snap(p.x - 120), y: snap(p.y - 40) });
    });

    // one finger (or mouse) pans; two fingers pinch-zoom
    let panning = false, psx = 0, psy = 0, pcx = 0, pcy = 0;
    const touches = new Map();
    let pinchDist = null;
    const pinchSpread = () => {
      const [a, b] = [...touches.values()];
      return Math.hypot(a.x - b.x, a.y - b.y);
    };
    const pinchMid = () => {
      const [a, b] = [...touches.values()];
      return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    };
    board.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.tcard') || e.target.closest('.board-search') || e.target.closest('.zoom-controls')
        || e.target.closest('.minimap') || (e.target.dataset && e.target.dataset.edgeId)) return;
      e.preventDefault();
      touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
      try { board.setPointerCapture(e.pointerId); } catch (_) {}
      if (touches.size === 2) {
        panning = false;
        board.classList.remove('panning');
        pinchDist = pinchSpread();
        return;
      }
      panning = true; psx = e.clientX; psy = e.clientY; pcx = CAM.x; pcy = CAM.y;
      board.classList.add('panning');
    });
    board.addEventListener('pointermove', (e) => {
      if (!touches.has(e.pointerId)) return;
      touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (touches.size === 2 && pinchDist) {
        const d = pinchSpread();
        if (d > 0 && pinchDist > 0) {
          const mid = pinchMid();
          zoomAt(d / pinchDist, mid.x, mid.y);
        }
        pinchDist = d;
        return;
      }
      if (!panning) return;
      CAM.x = pcx + (e.clientX - psx);
      CAM.y = pcy + (e.clientY - psy);
      applyCam();
    });
    const endPan = (e) => {
      if (e) touches.delete(e.pointerId);
      if (touches.size < 2) pinchDist = null;
      if (!panning) return;
      panning = false; board.classList.remove('panning'); saveCam();
    };
    board.addEventListener('pointerup', endPan);
    board.addEventListener('pointercancel', endPan);

  let LV_SORT = { key: 'due', dir: 1 };

    const cmp = {
      title: (a, b) => (a.title || '').localeCompare(b.title || ''),

      th.querySelector('.dir').textContent = th.dataset.sort === LV_SORT.key ? (LV_SORT.dir > 0 ? '▲' : '▼') : '';

    body.innerHTML = sorted.map(t => {
      const late = isOverdue(t);
      const who = assigneesOf(t.id).map(a => a.name).join(', ');
      return `<tr>
        <td><strong class="lv-title" data-details="${t.id}">${esc(t.title)}</strong>${

        <td><button class="status-badge ${statusClass(t.status)}" data-lcycle="${t.id}" title="Click to change status">${esc(statusLabel(t.status))}</button></td>
        <td style="text-transform:capitalize">${esc(t.priority)}</td>
        <td class="${late ? 'due-overdue' : ''}">${t.due_date
          ? new Date(t.due_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + (late ? ' (overdue)' : '')
          : '<span style="color:var(--muted)">—</span>'}</td>
        <td>${esc(who) || '<span style="color:var(--muted)">—</span>'}</td>
        <td class="actions">
          <button class="btn sm secondary" data-ledit="${t.id}">Edit</button>
          <button class="btn sm ghost" data-ldel="${t.id}">Delete</button>
        </td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" style="color:var(--muted)">No tasks yet.</td></tr>';
  }
  document.querySelectorAll('.listview th[data-sort]').forEach(th => th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (LV_SORT.key === key) LV_SORT.dir = -LV_SORT.dir;
    else LV_SORT = { key, dir: 1 };
    renderListView();
  }));
  document.getElementById('listView').addEventListener('click', async (e) => {
    const cyc = e.target.closest('[data-lcycle]');
    const edit = e.target.closest('[data-ledit]');
    const del = e.target.closest('[data-ldel]');
    const det = e.target.closest('[data-details]');
    if (cyc) {
      const t = TASKS.find(x => x.id === +cyc.dataset.lcycle);
      if (!t) return;
      const next = STATUSES[(STATUSES.indexOf(t.status) + 1) % STATUSES.length];
      const { error } = await supabase.from('tasks').update({ status: next }).eq('id', t.id);
      if (error) { toast(error.message); return; }
      t.status = next;
      renderListView(); renderTaskList();
    } else if (edit) {
      const t = TASKS.find(x => x.id === +edit.dataset.ledit);
      if (t) openModal(t);
    } else if (del) {
      const t = TASKS.find(x => x.id === +del.dataset.ldel);
      if (t && await confirmDialog(`Delete "${esc(t.title)}"? This cannot be undone.`)) {
        const { error } = await supabase.from('tasks').delete().eq('id', t.id);
        if (error) toast(error.message); else load();
      }
    } else if (det) {
      const t = TASKS.find(x => x.id === +det.dataset.details);
      if (t) openDetails(t);
    }
  });

  // ---------- Kanban ----------
  const kanbanParentOf = (taskId) => {
    const e = EDGES.find(e => e.to_id === taskId);
    return e ? TASKS.find(t => t.id === e.from_id) || null : null;
  };
  const kanbanIsRoot = (taskId) =>
    EDGES.some(e => e.from_id === taskId) && !EDGES.some(e => e.to_id === taskId);
  const kanbanInitials = (name) => {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    return (parts[0][0] + (parts.length > 1 ? parts[parts.length - 1][0] : '')).toUpperCase();
  };
  function kanbanCardHTML(t) {
    const root = kanbanIsRoot(t.id);
    const parent = kanbanParentOf(t.id);
    const priority = String(t.priority || 'medium').toLowerCase();
    let dueClass = '', dueLabel = 'No due date';
    if (t.due_date) {
      dueLabel = esc(t.due_date);
      if (t.due_date < new Date().toLocaleDateString('en-CA') && t.status !== 'done') dueClass = ' overdue';
    }
    const people = assigneesOf(t.id);
    let avatars = people.slice(0, 3).map(a => `<span class="kavatar" title="${esc(a.name)}">${esc(kanbanInitials(a.name))}</span>`).join('');
    if (people.length > 3) avatars += `<span class="kavatar more">+${people.length - 3}</span>`;
    return `<article class="kcard${root ? ' kroot' : ''}" draggable="true" data-id="${t.id}" data-priority="${esc(priority)}">
      <div class="kcard-head"><div class="kcard-title-row">${root ? '<span class="kcard-parent-badge">PARENT</span>' : ''}<div class="kcard-title">${esc(t.title || '#' + t.id)}</div></div>
      <div class="kcard-actions">
        <button type="button" class="kcard-edit" data-kedit="${t.id}" draggable="false" title="Edit task"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4.2L19.6 8.6a2 2 0 0 0 0-2.8l-1.4-1.4a2 2 0 0 0-2.8 0L4 15.8V20Zm3.4-2H6v-1.4L14.8 7.8l1.4 1.4L7.4 18Zm8.8-11.6 1.4-1.4 1.4 1.4-1.4 1.4-1.4-1.4Z" fill="currentColor"/></svg></button>
        <button type="button" class="kcard-toggle" data-ktoggle="${t.id}" draggable="false" title="Show description">▸</button>
      </div></div>
      <div class="kcard-meta"><span class="kcard-chip${dueClass}">📅 ${dueLabel}</span><span class="kcard-chip priority">● ${esc(priority)}</span></div>
      ${parent ? `<div class="kcard-parent" title="Parent: ${esc(parent.title)}">↳ <span>${esc(parent.title)}</span></div>` : ''}
      <div class="kcard-desc">${t.description ? esc(String(t.description)) : 'No description provided.'}</div>
      <div class="kcard-footer">${people.length ? `<div class="kcard-assignees">${avatars}</div>` : '<span class="kcard-unassigned">Unassigned</span>'}<span class="kcard-id">#${t.id}</span></div>
    </article>`;
  }
  function renderKanban() {
    const kb = document.getElementById('kanban');
    if (!kb || !document.body.classList.contains('kanban-mode')) return;
    kb.querySelectorAll('.kanban-col-body').forEach(b => { b.innerHTML = ''; });
    const counts = { 'main': 0, 'open': 0, 'in-progress': 0, 'done': 0 };
    TASKS.forEach(t => {
      let target;
      if (kanbanIsRoot(t.id)) { target = kb.querySelector('.kanban-col-body[data-status="main"]'); counts.main++; }
      else { target = kb.querySelector(`.kanban-col-body[data-status="${t.status}"]`); counts[t.status] = (counts[t.status] || 0) + 1; }
      if (target) target.insertAdjacentHTML('beforeend', kanbanCardHTML(t));
    });
    kb.querySelectorAll('.kanban-col-count').forEach(c => { c.textContent = counts[c.dataset.count] || 0; });
  }
  document.addEventListener('click', (e) => {
    const editBtn = e.target.closest('[data-kedit]');
    if (editBtn) {
      e.preventDefault(); e.stopPropagation();
      const t = TASKS.find(t => t.id === +editBtn.dataset.kedit);
      if (t) openModal(t);
      return;
    }
    const btn = e.target.closest('.kcard-toggle');
    if (btn) {
      e.preventDefault(); e.stopPropagation();
      const desc = btn.closest('.kcard')?.querySelector('.kcard-desc');
      if (!desc) return;
      const open = desc.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.title = open ? 'Hide description' : 'Show description';
    }
  });
  let kanbanDragId = null;
  document.addEventListener('dragstart', (e) => {
    if (e.target.closest && e.target.closest('.kcard-actions')) { e.preventDefault(); return; }
    const card = e.target.closest && e.target.closest('.kcard');
    if (!card) return;
    kanbanDragId = +card.dataset.id;
    card.classList.add('dragging');
    if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', String(kanbanDragId)); } catch (_) {} }
  });
  document.addEventListener('dragend', (e) => {
    e.target.closest && e.target.closest('.kcard')?.classList.remove('dragging');
    document.querySelectorAll('.drop-hover').forEach(el => el.classList.remove('drop-hover'));
  });
  const kanbanDropZone = (el) => el.closest ? el.closest('.kanban-col') : null;
  document.addEventListener('dragover', (e) => {
    const zone = kanbanDropZone(e.target);
    if (!zone || !document.body.classList.contains('kanban-mode')) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.drop-hover').forEach(el => { if (el !== zone) el.classList.remove('drop-hover'); });
    zone.classList.add('drop-hover');
  });
  document.addEventListener('dragleave', (e) => {
    const zone = kanbanDropZone(e.target);
    if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drop-hover');
  });
  document.addEventListener('drop', async (e) => {
    const zone = kanbanDropZone(e.target);
    if (!zone || kanbanDragId == null) return;
    e.preventDefault();
    zone.classList.remove('drop-hover');
    const newStatus = zone.querySelector('[data-status]')?.dataset.status;
    const movingId = kanbanDragId;
    kanbanDragId = null;
    if (!newStatus || newStatus === 'main') return;
    const t = TASKS.find(x => x.id === movingId);
    if (!t || t.status === newStatus) return;
    const prev = t.status;
    t.status = newStatus;
    renderKanban();
    const { error } = await supabase.from('tasks').update({ status: newStatus }).eq('id', movingId);
    if (error) { t.status = prev; renderKanban(); }
  });

  // ---------- view toggle ----------
  (function () {
    const vt = document.getElementById('viewToggle');
    function setView(view) {
      document.body.classList.toggle('kanban-mode', view === 'kanban');
      document.body.classList.toggle('list-mode', view === 'list');
      vt.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.view === view));
      try { localStorage.setItem('vsa-tasks-view', view); } catch (_) {}
      if (view === 'kanban') renderKanban();
      else if (view === 'list') renderListView();
      else renderBoard();
    }
    vt.addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (b) setView(b.dataset.view);
    });
    let saved = null;
    try { saved = localStorage.getItem('vsa-tasks-view'); } catch (_) {}
    if (saved === 'kanban' || saved === 'list') setView(saved);
  })();

  // ---------- live sync (Supabase Realtime; 60s poll as a safety net) ----------
  (function () {
    const modalOpen = () => overlay.style.display !== 'none' || detpop.style.display !== 'none';
    const busy = () => modalOpen() || CARD_DRAGGING || !!LINKING;
    let refreshTimer = null;
    async function refresh() {
      if (busy() || document.hidden) return;
      try {
        const d = await fetchAll();
        const changed = JSON.stringify(d.tasks) !== JSON.stringify(TASKS)
          || JSON.stringify(d.edges) !== JSON.stringify(EDGES)
          || JSON.stringify(d.assignees) !== JSON.stringify(ASSIGNEES)
          || JSON.stringify(d.officers) !== JSON.stringify(OFFICERS);
        if (!changed || busy()) return;
        TASKS = d.tasks; EDGES = d.edges; ASSIGNEES = d.assignees; OFFICERS = d.officers;
        renderBoard(); renderTaskList(); renderKanban(); renderListView();
      } catch (e) {}
    }
    // debounce bursts of change events; retry while a drag/modal is in flight
    function scheduleRefresh(delay = 150) {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        if (busy()) { scheduleRefresh(800); return; }
        refresh();
      }, delay);
    }
    supabase.channel('task-board')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => scheduleRefresh())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'task_edges' }, () => scheduleRefresh())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'task_assignees' }, () => scheduleRefresh())
      .subscribe();
    setInterval(() => { if (!document.hidden) scheduleRefresh(); }, 60000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) scheduleRefresh(); });
  })();

  await load();
</script>
</body>
</html>
