<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Settings | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<style>
  .eng-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .eng-tabs .tab {
    padding: 7px 14px; border-radius: 99px; cursor: pointer; font-size: .88rem;
    border: 1px solid rgba(128,128,128,.3); background: transparent; color: inherit;
  }
  .eng-tabs .tab.on { background: rgba(200,32,47,.12); border-color: var(--gold, #e0b45c); font-weight: 700; }
  .btn.small { padding: 6px 13px; font-size: .82rem; }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-pill { font-size: .74rem; padding: 2px 9px; border-radius: 99px; }
  .status-pill.live { background: rgba(47,158,99,.15); color: #2f9e63; }
  .status-pill.off { background: rgba(128,128,128,.18); color: var(--muted); }
  .redeem-bar { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; align-items: end; margin-bottom: 18px; }
  @media (max-width: 700px) { .redeem-bar { grid-template-columns: 1fr; } }
  .desc-cell { color: var(--muted); font-size: .84rem; max-width: 320px; }
  .grant-list { max-height: 46vh; overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; padding: 4px 0; margin-top: 10px; }
  .grant-row { display: flex; align-items: center; gap: 10px; padding: 7px 13px; cursor: pointer; font-size: .9rem; }
  .grant-row:hover { background: rgba(128,128,128,.08); }
  .grant-row input { width: 16px; height: 16px; cursor: pointer; }
  .grant-row .gr-meta { color: var(--muted); font-size: .8rem; margin-left: auto; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading engagement settings…</div>
<script type="module">
  import { requireOfficer } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';

  const ctx = await requireOfficer();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'Engagement Settings');

  const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  const vnd = (n) => (n ?? 0).toLocaleString('vi-VN');
  const fmtWhen = (d) => new Date(d).toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

  const SIZES = ['XS', 'S', 'M', 'L', 'XL', 'XXL'];
  const cap = (c) => c ? c[0].toUpperCase() + c.slice(1) : '—';

  let tab = 'achievements';
  let achievements = [], rewards = [], redemptions = [], profiles = [], awardCounts = new Map();

  async function load() {
    const [a, r, rd, p, aw] = await Promise.all([
      supabase.from('achievements').select('*').order('name'),
      supabase.from('rewards').select('*').order('name'),
      supabase.from('reward_redemptions').select('*').order('created_at', { ascending: false }),
      supabase.from('profiles').select('id, full_name, alias, points').order('full_name'),
      supabase.from('achievement_awards').select('achievement_id'),
    ]);
    achievements = a.data || [];
    rewards = r.data || [];
    redemptions = rd.data || [];
    profiles = p.data || [];
    awardCounts = new Map();
    (aw.data || []).forEach(x => awardCounts.set(x.achievement_id, (awardCounts.get(x.achievement_id) || 0) + 1));
    render();
  }

  const nameOf = (id) => profiles.find(p => p.id === id)?.full_name || '—';
  const redeemCount = (id) => redemptions.filter(r => r.reward_id === id).length;

  function render() {
    page.innerHTML = `
      <div class="card">
        <h2>Engagement Settings</h2>
        <p style="color:var(--muted); font-size:.86rem; margin-bottom:14px">
          The VND economy: achievements put VND in, rewards take VND out.
          Prefer <strong>deactivating</strong> over deleting — inactive items keep their history but can't be granted or redeemed.</p>
        <div class="eng-tabs" id="tabs">
          <button class="tab ${tab === 'achievements' ? 'on' : ''}" data-tab="achievements">🏆 Achievements</button>
          <button class="tab ${tab === 'rewards' ? 'on' : ''}" data-tab="rewards">🎁 Rewards</button>
          <button class="tab ${tab === 'redemptions' ? 'on' : ''}" data-tab="redemptions">✅ Redemptions</button>
          <button class="tab ${tab === 'grant' ? 'on' : ''}" data-tab="grant">💰 Grant VND</button>
        </div>
        <div id="tab-body"></div>
        <p class="notice" id="notice" style="margin-top:14px"></p>
      </div>`;
    page.querySelectorAll('#tabs .tab').forEach(b => b.onclick = () => { tab = b.dataset.tab; render(); });
    ({ achievements: renderAchievements, rewards: renderRewards, redemptions: renderRedemptions, grant: renderGrant })[tab]();
  }

  const say = (msg, cls) => {
    const n = page.querySelector('#notice');
    n.textContent = msg; n.className = `notice ${cls}`;
  };

  // ---------- achievements tab ----------
  function renderAchievements() {
    const body = page.querySelector('#tab-body');
    body.innerHTML = `
      <div style="margin-bottom:12px"><button class="btn small" id="new-ach">+ New achievement</button></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Achievement</th><th>Description</th><th>VND</th><th>Status</th><th>Awarded</th><th></th></tr></thead>
          <tbody>
            ${achievements.map(a => `
              <tr>
                <td><strong>${a.icon ? esc(a.icon) + ' ' : '🏆 '}${esc(a.name)}</strong></td>
                <td class="desc-cell">${esc(a.description || '')}</td>
                <td><strong>+${vnd(a.points)}</strong></td>
                <td><span class="status-pill ${a.active ? 'live' : 'off'}">${a.active ? 'active' : 'inactive'}</span></td>
                <td>${awardCounts.get(a.id) || 0}×</td>
                <td class="row-actions">
                  <button class="btn ghost small" data-edit="${a.id}">Edit</button>
                  <button class="btn ghost small" data-toggle="${a.id}">${a.active ? 'Deactivate' : 'Activate'}</button>
                  ${(awardCounts.get(a.id) || 0) === 0 ? `<button class="btn ghost small" data-del="${a.id}">Delete</button>` : ''}
                </td>
              </tr>`).join('') || '<tr><td colspan="6" style="color:var(--muted)">No achievements yet — create the first one!</td></tr>'}
          </tbody>
        </table>
      </div>`;
    body.querySelector('#new-ach').onclick = () => achModal(null);
    body.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => achModal(achievements.find(a => a.id === +b.dataset.edit)));
    body.querySelectorAll('[data-toggle]').forEach(b => b.onclick = async () => {
      const a = achievements.find(x => x.id === +b.dataset.toggle);
      const { error } = await supabase.from('achievements').update({ active: !a.active }).eq('id', a.id);
      if (error) { say(error.message, 'error'); return; }
      await load(); say(`"${a.name}" is now ${a.active ? 'inactive' : 'active'}.`, 'ok');
    });
    body.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const a = achievements.find(x => x.id === +b.dataset.del);
      if (!confirm(`Delete "${a.name}"? It has never been awarded, so nothing else is affected.`)) return;
      const { error } = await supabase.from('achievements').delete().eq('id', a.id);
      if (error) { say(error.message, 'error'); return; }
      await load(); say(`Deleted "${a.name}".`, 'ok');
    });
  }

  function achModal(a) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>${a ? 'Edit achievement' : 'New achievement'}</h2>
        <div class="notice" id="m-notice"></div>
        <form id="m-form">
          <div class="field-row">
            <div class="field" style="flex:0 0 90px"><label>Icon (emoji)</label><input id="f-icon" maxlength="8" placeholder="🏆" value="${esc(a?.icon || '')}"></div>
            <div class="field"><label>Name</label><input id="f-name" required value="${esc(a?.name)}"></div>
          </div>
          <div class="field"><label>Description</label><textarea id="f-desc">${esc(a?.description)}</textarea></div>
          <div class="field"><label>VND granted when awarded</label><input type="number" id="f-pts" min="0" value="${a?.points ?? 10}"></div>
          <label style="display:flex; gap:8px; align-items:center; font-size:.9rem; margin-bottom:6px">
            <input type="checkbox" id="f-active" style="width:16px; height:16px" ${a ? (a.active ? 'checked' : '') : 'checked'}> Active (can be granted)</label>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="m-cancel">Cancel</button>
            <button type="submit" class="btn">${a ? 'Save' : 'Create'}</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(back);
    back.querySelector('#m-cancel').onclick = () => back.remove();
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
    back.querySelector('#m-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        icon: back.querySelector('#f-icon').value.trim() || null,
        name: back.querySelector('#f-name').value.trim(),
        description: back.querySelector('#f-desc').value.trim() || null,
        points: Math.max(0, Math.floor(+back.querySelector('#f-pts').value || 0)),
        active: back.querySelector('#f-active').checked,
      };
      const { error } = a
        ? await supabase.from('achievements').update(payload).eq('id', a.id)
        : await supabase.from('achievements').insert({ ...payload, created_by: ctx.user.id });
      if (error) {
        const n = back.querySelector('#m-notice'); n.textContent = error.message; n.className = 'notice error';
        return;
      }
      back.remove();
      await load(); say(`${a ? 'Saved' : 'Created'} "${payload.name}".`, 'ok');
    });
  }

  // ---------- rewards tab ----------
  function renderRewards() {
    const body = page.querySelector('#tab-body');
    body.innerHTML = `
      <div style="margin-bottom:12px"><button class="btn small" id="new-rw">+ New reward</button></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Reward</th><th>Description</th><th>Cost</th><th>Category</th><th>Left</th><th>Status</th><th>Redeemed</th><th></th></tr></thead>
          <tbody>
            ${rewards.map(r => `
              <tr>
                <td><strong>🎁 ${esc(r.name)}</strong></td>
                <td class="desc-cell">${esc(r.description || '')}</td>
                <td><strong>${vnd(r.point_cost)} VND</strong></td>
                <td>${cap(r.category)}${r.category === 'clothing' && r.sizes?.length ? `<div style="color:var(--muted); font-size:.76rem">${r.sizes.join(' · ')}</div>` : ''}</td>
                <td>${r.stock == null ? '∞' : (r.stock === 0 ? '<strong style="color:#c8202f">0</strong>' : `<strong>${r.stock}</strong>`)}</td>
                <td><span class="status-pill ${r.active ? 'live' : 'off'}">${r.active ? 'active' : 'inactive'}</span></td>
                <td>${redeemCount(r.id)}×</td>
                <td class="row-actions">
                  <button class="btn ghost small" data-edit="${r.id}">Edit</button>
                  <button class="btn ghost small" data-toggle="${r.id}">${r.active ? 'Deactivate' : 'Activate'}</button>
                  <button class="btn ghost small" data-del="${r.id}">Delete</button>
                </td>
              </tr>`).join('') || '<tr><td colspan="8" style="color:var(--muted)">No rewards yet — create the first one!</td></tr>'}
          </tbody>
        </table>
      </div>`;
    body.querySelector('#new-rw').onclick = () => rwModal(null);
    body.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => rwModal(rewards.find(r => r.id === +b.dataset.edit)));
    body.querySelectorAll('[data-toggle]').forEach(b => b.onclick = async () => {
      const r = rewards.find(x => x.id === +b.dataset.toggle);
      const { error } = await supabase.from('rewards').update({ active: !r.active }).eq('id', r.id);
      if (error) { say(error.message, 'error'); return; }
      await load(); say(`"${r.name}" is now ${r.active ? 'inactive' : 'active'}.`, 'ok');
    });
    body.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const r = rewards.find(x => x.id === +b.dataset.del);
      const n = redeemCount(r.id);
      if (!confirm(`Delete "${r.name}"?${n ? ` Its ${n} past redemption${n > 1 ? 's' : ''} will stay in the history.` : ''}`)) return;
      const { error } = await supabase.from('rewards').delete().eq('id', r.id);
      if (error) { say(error.message, 'error'); return; }
      await load(); say(`Deleted "${r.name}".`, 'ok');
    });
  }

  function rwModal(r) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>${r ? 'Edit reward' : 'New reward'}</h2>
        <div class="notice" id="m-notice"></div>
        <form id="m-form">
          <div class="field"><label>Name</label><input id="f-name" required value="${esc(r?.name)}"></div>
          <div class="field"><label>Description</label><textarea id="f-desc">${esc(r?.description)}</textarea></div>
          <div class="field-row">
            <div class="field"><label>Cost (VND)</label><input type="number" id="f-cost" min="0" value="${r?.point_cost ?? 50}"></div>
            <div class="field"><label>Quantity left <span style="opacity:.55; font-weight:400">(blank = unlimited)</span></label>
              <input type="number" id="f-stock" min="0" value="${r?.stock ?? ''}"></div>
          </div>
          <div class="field"><label>Category</label>
            <select id="f-cat">
              <option value="">— none —</option>
              ${['clothing', 'food', 'drinks', 'accessory'].map(c =>
                `<option value="${c}" ${r?.category === c ? 'selected' : ''}>${cap(c)}</option>`).join('')}
            </select></div>
          <div class="field" id="sizes-field" style="display:${r?.category === 'clothing' ? '' : 'none'}">
            <label>Available sizes</label>
            <div style="display:flex; gap:12px; flex-wrap:wrap">
              ${SIZES.map(sz => `<label style="display:flex; gap:5px; align-items:center; font-size:.88rem">
                <input type="checkbox" class="f-size" value="${sz}" style="width:15px; height:15px"
                  ${(r?.sizes || SIZES).includes(sz) ? 'checked' : ''}>${sz}</label>`).join('')}
            </div></div>
          <label style="display:flex; gap:8px; align-items:center; font-size:.9rem; margin-bottom:6px">
            <input type="checkbox" id="f-active" style="width:16px; height:16px" ${r ? (r.active ? 'checked' : '') : 'checked'}> Active (can be redeemed)</label>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="m-cancel">Cancel</button>
            <button type="submit" class="btn">${r ? 'Save' : 'Create'}</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(back);
    back.querySelector('#m-cancel').onclick = () => back.remove();
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
    back.querySelector('#f-cat').addEventListener('change', () => {
      back.querySelector('#sizes-field').style.display =
        back.querySelector('#f-cat').value === 'clothing' ? '' : 'none';
    });
    back.querySelector('#m-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const category = back.querySelector('#f-cat').value || null;
      const sizes = category === 'clothing'
        ? [...back.querySelectorAll('.f-size:checked')].map(c => c.value)
        : null;
      const stockRaw = back.querySelector('#f-stock').value.trim();
      if (category === 'clothing' && !sizes.length) {
        const n = back.querySelector('#m-notice'); n.textContent = 'Pick at least one size for a clothing reward.'; n.className = 'notice error';
        return;
      }
      const payload = {
        name: back.querySelector('#f-name').value.trim(),
        description: back.querySelector('#f-desc').value.trim() || null,
        point_cost: Math.max(0, Math.floor(+back.querySelector('#f-cost').value || 0)),
        category, sizes,
        stock: stockRaw === '' ? null : Math.max(0, Math.floor(+stockRaw || 0)),
        active: back.querySelector('#f-active').checked,
      };
      const { error } = r
        ? await supabase.from('rewards').update(payload).eq('id', r.id)
        : await supabase.from('rewards').insert({ ...payload, created_by: ctx.user.id });
      if (error) {
        const n = back.querySelector('#m-notice'); n.textContent = error.message; n.className = 'notice error';
        return;
      }
      back.remove();
      await load(); say(`${r ? 'Saved' : 'Created'} "${payload.name}".`, 'ok');
    });
  }

  // ---------- redemptions tab ----------
  function renderRedemptions() {
    const body = page.querySelector('#tab-body');
    const active = rewards.filter(r => r.active);
    const pendOf = (uid) => redemptions.filter(r => r.user_id === uid && r.status === 'pending')
      .reduce((s, r) => s + r.points_spent, 0);
    body.innerHTML = `
      <div class="redeem-bar">
        <div class="field" style="margin-bottom:0"><label>Member</label>
          <select id="rd-member">${profiles.map(p =>
            `<option value="${p.id}">${esc(p.full_name)}${p.alias ? ` “${esc(p.alias)}”` : ''} — ${vnd(p.points - pendOf(p.id))} VND spendable</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0"><label>Reward</label>
          <select id="rd-reward">${active.map(r =>
            `<option value="${r.id}" ${r.stock === 0 ? 'disabled' : ''}>${esc(r.name)} — ${vnd(r.point_cost)} VND${r.stock != null ? (r.stock === 0 ? ' · sold out' : ` · ${r.stock} left`) : ''}</option>`).join('') || '<option value="">No active rewards</option>'}</select>
        </div>
        <div class="field" style="margin-bottom:0" id="rd-size-wrap" hidden><label>Size</label>
          <select id="rd-size"></select></div>
        <button class="btn small" id="rd-go" ${active.length ? '' : 'disabled'} style="margin-bottom:2px">Mark as redeemed</button>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Requested</th><th>Member</th><th>Reward</th><th>VND</th><th>Status</th></tr></thead>
          <tbody>
            ${[...redemptions].sort((a, b) => (a.status === 'pending' ? 0 : 1) - (b.status === 'pending' ? 0 : 1)).map(r => `
              <tr>
                <td style="color:var(--muted); font-size:.84rem; white-space:nowrap">${fmtWhen(r.created_at)}</td>
                <td><strong>${esc(nameOf(r.user_id))}</strong></td>
                <td>🎁 ${esc(r.reward_name)}${r.size ? ` <span style="color:var(--muted); font-size:.8rem">(${esc(r.size)})</span>` : ''}</td>
                <td>−${vnd(r.points_spent)}</td>
                <td>${r.status === 'pending'
                  ? `<span class="status-pill off" style="background:rgba(224,138,61,.16); color:#e08a3d">pending</span>
                     <span class="row-actions" style="display:inline-flex; margin-left:6px">
                       <button class="btn small" data-complete="${r.id}">Complete</button>
                       <button class="btn ghost small" data-cancelrd="${r.id}">Cancel</button>
                     </span>`
                  : `<span class="status-pill live">✓ ${esc(nameOf(r.redeemed_by))}</span>
                     <span style="color:var(--muted); font-size:.8rem"> · ${fmtWhen(r.completed_at || r.created_at)}</span>`}</td>
              </tr>`).join('') || '<tr><td colspan="5" style="color:var(--muted)">No redemptions yet.</td></tr>'}
          </tbody>
        </table>
      </div>`;

    body.querySelectorAll('[data-complete]').forEach(b => b.onclick = async () => {
      const r = redemptions.find(x => x.id === +b.dataset.complete);
      if (!confirm(`Hand over "${r.reward_name}" to ${nameOf(r.user_id)} and deduct ${vnd(r.points_spent)} VND?`)) return;
      const { data, error } = await supabase.rpc('complete_redemption', { redemption: r.id });
      if (error) { say(error.message, 'error'); return; }
      await load();
      say(`Completed — ${nameOf(r.user_id)} now has ${vnd(data)} VND.`, 'ok');
    });
    body.querySelectorAll('[data-cancelrd]').forEach(b => b.onclick = async () => {
      const r = redemptions.find(x => x.id === +b.dataset.cancelrd);
      if (!confirm(`Cancel ${nameOf(r.user_id)}'s pending redemption of "${r.reward_name}"? The ${vnd(r.points_spent)} VND hold is released.`)) return;
      const { error } = await supabase.rpc('cancel_redemption', { redemption: r.id });
      if (error) { say(error.message, 'error'); return; }
      await load();
      say(`Cancelled "${r.reward_name}" for ${nameOf(r.user_id)}.`, 'ok');
    });

    const rdReward = body.querySelector('#rd-reward');
    const rdSizeWrap = body.querySelector('#rd-size-wrap');
    const syncSize = () => {
      const r = rewards.find(x => x.id === +rdReward.value);
      const clothing = r?.category === 'clothing';
      rdSizeWrap.hidden = !clothing;
      if (clothing) {
        body.querySelector('#rd-size').innerHTML =
          (r.sizes?.length ? r.sizes : SIZES).map(sz => `<option>${sz}</option>`).join('');
      }
    };
    rdReward.addEventListener('change', syncSize);
    if (active.length) syncSize();

    body.querySelector('#rd-go').onclick = async () => {
      const uid = body.querySelector('#rd-member').value;
      const rid = +body.querySelector('#rd-reward').value;
      const m = profiles.find(p => p.id === uid);
      const r = rewards.find(x => x.id === rid);
      if (!m || !r) return;
      if (r.stock === 0) { say(`"${r.name}" is sold out.`, 'error'); return; }
      const size = r.category === 'clothing' ? body.querySelector('#rd-size').value : null;
      const spend = m.points - pendOf(m.id);
      if (spend < r.point_cost) {
        say(`${m.full_name} has ${vnd(spend)} VND spendable${pendOf(m.id) ? ` (${vnd(m.points)} balance − ${vnd(pendOf(m.id))} pending)` : ''} — "${r.name}" costs ${vnd(r.point_cost)}.`, 'error');
        return;
      }
      if (!confirm(`Redeem "${r.name}"${size ? ` (${size})` : ''} (${vnd(r.point_cost)} VND) for ${m.full_name}? They'll have ${vnd(m.points - r.point_cost)} VND left.`)) return;
      const { data, error } = await supabase.rpc('redeem_reward', { target: uid, reward: rid, size });
      if (error) { say(error.message, 'error'); return; }
      await load();
      say(`Redeemed "${r.name}" for ${m.full_name} — they now have ${vnd(data)} VND.`, 'ok');
    };
  }

  // ---------- bulk grant tab ----------
  let grantSel = new Set(), grantQ = '';
  function renderGrant() {
    const body = page.querySelector('#tab-body');
    const needle = grantQ.trim().toLowerCase();
    const visible = profiles.filter(p => !needle
      || `${p.full_name} ${p.alias || ''}`.toLowerCase().includes(needle));
    body.innerHTML = `
      <p style="color:var(--muted); font-size:.86rem; margin-bottom:12px">
        Grant VND to several members at once — e.g. everyone who attended an event.
        Each member gets their own audit entry with the reason.</p>
      <div class="field-row">
        <div class="field"><label>Amount (VND each)</label><input type="number" id="g-amt" min="1" value="10"></div>
        <div class="field"><label>Reason <span style="opacity:.55; font-weight:400">(shown in audit log)</span></label>
          <input id="g-reason" placeholder="e.g. Attended Tết 2026"></div>
      </div>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
        <div class="field" style="margin-bottom:0; flex:1; min-width:200px">
          <input id="g-q" placeholder="Search members…" value="${esc(grantQ)}" autocomplete="off"></div>
        <button class="btn ghost small" id="g-all">Select all shown</button>
        <button class="btn ghost small" id="g-none">Clear</button>
      </div>
      <div class="grant-list">
        ${visible.map(p => `
          <label class="grant-row">
            <input type="checkbox" data-gm="${p.id}" ${grantSel.has(p.id) ? 'checked' : ''}>
            <span><strong>${esc(p.full_name)}</strong>${p.alias ? ` <span style="color:var(--muted)">“${esc(p.alias)}”</span>` : ''}</span>
            <span class="gr-meta">${vnd(p.points)} VND</span>
          </label>`).join('') || '<p style="color:var(--muted); padding:10px 13px">No members match.</p>'}
      </div>
      <div class="row-btns" style="justify-content:flex-start; margin-top:14px">
        <button class="btn small" id="g-go">Grant to ${grantSel.size} member${grantSel.size === 1 ? '' : 's'}</button>
      </div>`;

    body.querySelector('#g-q').addEventListener('input', (e) => {
      grantQ = e.target.value;
      renderGrant();
      const q = page.querySelector('#g-q');
      q.focus(); q.setSelectionRange(q.value.length, q.value.length);
    });
    body.querySelectorAll('[data-gm]').forEach(cb => cb.addEventListener('change', () => {
      cb.checked ? grantSel.add(cb.dataset.gm) : grantSel.delete(cb.dataset.gm);
      body.querySelector('#g-go').textContent = `Grant to ${grantSel.size} member${grantSel.size === 1 ? '' : 's'}`;
    }));
    body.querySelector('#g-all').onclick = () => { visible.forEach(p => grantSel.add(p.id)); renderGrant(); };
    body.querySelector('#g-none').onclick = () => { grantSel.clear(); renderGrant(); };
    body.querySelector('#g-go').onclick = async () => {
      const amt = Math.floor(+body.querySelector('#g-amt').value || 0);
      const reason = body.querySelector('#g-reason').value.trim() || null;
      if (amt < 1) { say('Enter an amount of at least 1 VND.', 'error'); return; }
      if (!grantSel.size) { say('Select at least one member.', 'error'); return; }
      if (!confirm(`Give ${vnd(amt)} VND to ${grantSel.size} member${grantSel.size === 1 ? '' : 's'}${reason ? ` for "${reason}"` : ''}?`)) return;
      const { data, error } = await supabase.rpc('grant_points_many',
        { targets: [...grantSel], delta: amt, reason });
      if (error) { say(error.message, 'error'); return; }
      grantSel.clear();
      await load();
      say(`Granted ${vnd(amt)} VND to ${data} members. 🎉`, 'ok');
    };
  }

  await load();
</script>
</body>
</html>
