<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Board Manager | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
</head>
<body>
<div class="loading" id="loading">Loading e-board…</div>
<script type="module">
  import { requireAdmin } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';

  const IMG_BASE = 'https://wrlpsetbkeyoyamkopgf.supabase.co/storage/v1/object/public/site-images/';
  const ctx = await requireAdmin();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'E-Board Manager');

  let members = [];
  const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');

  async function load() {
    const { data } = await supabase.from('eboard_members').select('*')
      .order('is_lead', { ascending: false }).order('sort');
    members = data || [];
    render();
  }

  function render() {
    const row = (m, i, arr) => `
      <tr style="${m.active ? '' : 'opacity:.45'}">
        <td style="width:56px">
          <img src="${m.photo_path ? IMG_BASE + m.photo_path : '/assets/img/logo-128.png'}"
               style="width:44px; height:44px; border-radius:50%; object-fit:cover; box-shadow:0 0 0 2px var(--gold)">
        </td>
        <td><strong>${esc(m.full_name)}</strong>${m.is_lead ? ' <span class="badge admin">lead</span>' : ''}${m.active ? '' : ' <span class="badge">hidden</span>'}</td>
        <td>${esc(m.role_title)}</td>
        <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted)">${esc(m.bio)}</td>
        <td class="actions">
          <button class="btn sm ghost" data-mv="${m.id}" data-d="-1" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="btn sm ghost" data-mv="${m.id}" data-d="1" ${i === arr.length - 1 ? 'disabled' : ''}>↓</button>
          <button class="btn sm secondary" data-edit="${m.id}">Edit</button>
          <button class="btn sm ghost" data-del="${m.id}">✕</button>
        </td>
      </tr>`;

    page.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:14px">
          <div>
            <h2 style="margin-bottom:2px">Public E-Board page</h2>
            <p style="color:var(--muted); font-size:.86rem">Changes appear on umkcvsa.org/eboard/ instantly. Leads render in the big top row.</p>
          </div>
          <button class="btn" id="new">+ Add member</button>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th></th><th>Name</th><th>Role</th><th>Bio</th><th></th></tr></thead>
            <tbody>${members.map((m, i) => row(m, i, members)).join('') || '<tr><td colspan="5" style="color:var(--muted)">No members yet.</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;

    document.getElementById('new').onclick = () => openModal();
    page.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openModal(members.find(m => m.id === +b.dataset.edit)));
    page.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const m = members.find(x => x.id === +b.dataset.del);
      if (!await confirmModal(`Remove ${m.full_name} from the public e-board?`)) return;
      await supabase.from('eboard_members').delete().eq('id', m.id);
      load();
    });
    page.querySelectorAll('[data-mv]').forEach(b => b.onclick = async () => {
      const i = members.findIndex(m => m.id === +b.dataset.mv);
      const j = i + Number(b.dataset.d);
      if (j < 0 || j >= members.length) return;
      await Promise.all([
        supabase.from('eboard_members').update({ sort: j, is_lead: members[j].is_lead }).eq('id', members[i].id),
        supabase.from('eboard_members').update({ sort: i, is_lead: members[i].is_lead }).eq('id', members[j].id),
      ]);
      load();
    });
  }

  function confirmModal(msg) {
    return new Promise((resolve) => {
      const back = document.createElement('div');
      back.className = 'modal-back';
      back.innerHTML = `<div class="modal pop"><h2>Are you sure?</h2>
        <p style="font-size:.92rem; color:var(--muted)">${esc(msg)}</p>
        <div class="row-btns"><button class="btn ghost" id="c-no">Cancel</button><button class="btn" id="c-yes">Remove</button></div></div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) { back.remove(); resolve(false); } });
      back.querySelector('#c-no').onclick = () => { back.remove(); resolve(false); };
      back.querySelector('#c-yes').onclick = () => { back.remove(); resolve(true); };
    });
  }

  function openModal(m) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>${m ? 'Edit member' : 'Add member'}</h2>
        <div class="notice" id="m-notice"></div>
        <form id="f">
          <div class="field"><label>Name</label><input id="f-name" required value="${esc(m?.full_name)}"></div>
          <div class="field"><label>Role title</label><input id="f-role" required value="${esc(m?.role_title)}" placeholder="e.g. Treasurer"></div>
          <div class="field"><label>Bio (optional)</label><textarea id="f-bio">${esc(m?.bio)}</textarea></div>
          <div class="field"><label>Photo (square works best, max 11 MB)</label><input type="file" id="f-photo" accept="image/png,image/jpeg,image/webp"></div>
          <div class="check-list">
            <label><input type="checkbox" id="f-lead" ${m?.is_lead ? 'checked' : ''}> Lead (big top row)</label>
            <label><input type="checkbox" id="f-active" ${m ? (m.active ? 'checked' : '') : 'checked'}> Visible on site</label>
          </div>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="m-cancel">Cancel</button>
            <button type="submit" class="btn">${m ? 'Save' : 'Add'}</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
    back.querySelector('#m-cancel').onclick = () => back.remove();

    back.querySelector('#f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const say = (t) => { const n = back.querySelector('#m-notice'); n.textContent = t; n.className = 'notice error'; };
      const payload = {
        full_name: back.querySelector('#f-name').value.trim(),
        role_title: back.querySelector('#f-role').value.trim(),
        bio: back.querySelector('#f-bio').value.trim() || null,
        is_lead: back.querySelector('#f-lead').checked,
        active: back.querySelector('#f-active').checked,
      };
      const file = back.querySelector('#f-photo').files[0];
      if (file) {
        if (file.size > 11 * 1024 * 1024) return say('Photo is larger than 11 MB.');
        const path = `eboard-${crypto.randomUUID()}.${file.name.split('.').pop().toLowerCase()}`;
        const { error } = await supabase.storage.from('site-images').upload(path, file);
        if (error) return say(error.message);
        if (m?.photo_path) await supabase.storage.from('site-images').remove([m.photo_path]);
        payload.photo_path = path;
      }
      const { error } = m
        ? await supabase.from('eboard_members').update(payload).eq('id', m.id)
        : await supabase.from('eboard_members').insert({ ...payload, sort: members.length });
      if (error) return say(error.message);
      back.remove();
      load();
    });
  }

  await load();
</script>
</body>
</html>
