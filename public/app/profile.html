<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<style>
.ac-pick { position:relative; }
.ac-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.ac-chips:empty { display:none; }
.ac-chip {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(201, 155, 63, .14); border:1px solid rgba(201, 155, 63, .4);
  border-radius:999px; padding:3px 6px 3px 12px; font-size:.82rem;
}
.ac-chip button {
  background:none; border:none; cursor:pointer; color:var(--muted);
  font-size:.95rem; line-height:1; padding:2px 5px; border-radius:50%;
}
.ac-chip button:hover { color:var(--red); }
.ac-menu {
  position:absolute; left:0; right:0; top:100%; z-index:40;
  background:var(--surface); border:1px solid var(--line); border-radius:10px;
  box-shadow:var(--shadow-lg); max-height:220px; overflow-y:auto; display:none;
}
.ac-menu.open { display:block; }
.ac-menu button {
  display:block; width:100%; text-align:left; background:none; border:none;
  padding:9px 14px; cursor:pointer; color:var(--text); font-size:.88rem;
}
.ac-menu button:hover, .ac-menu button.hl { background:rgba(201, 155, 63, .12); }
.ac-menu .none { padding:9px 14px; color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading profile…</div>
<script type="module">
  import { requireLogin } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';
  import { compressImage, outExt } from '/app/shared/img.js';

  const AVATAR_BASE = 'https://wrlpsetbkeyoyamkopgf.supabase.co/storage/v1/object/public/avatars/';

  const ctx = await requireLogin();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'My Profile');

  const p = ctx.profile || {};
  const avatarUrl = p.avatar_path ? AVATAR_BASE + p.avatar_path : '/assets/img/logo-128.png';
  const joined = p.created_at
    ? new Date(p.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    : '—';

  page.innerHTML = `
    <div class="card">
      <div class="profile-head">
        <img class="avatar-lg" id="avatar" src="${avatarUrl}" alt="Your avatar">
        <div>
          <h2 style="margin-bottom:4px" id="head-name">${p.full_name || 'Member'}${p.alias ? ` <span style="color:var(--gold); font-size:1.05rem">“${p.alias}”</span>` : ''}</h2>
          <p style="color:var(--muted); font-size:.9rem">${ctx.user.email} · member since ${joined}${p.linkedin_url ? ` · <a href="${p.linkedin_url}" target="_blank" rel="noopener" style="color:#0a66c2">LinkedIn</a>${p.show_linkedin ? '' : ' <span style="font-size:.75rem">(hidden from directory)</span>'}` : ''}</p>
          <p style="color:var(--muted); font-size:.85rem; margin-top:2px" id="acad-line"></p>
          <p style="margin-top:8px">${ctx.roles.map(r => `<span class="badge ${r}">${r}</span>`).join('')}</p>
        </div>
      </div>
      <div class="notice" id="notice"></div>
      <form id="profile-form" style="max-width:460px">
        <div class="field-row">
          <div class="field">
            <label>First name</label>
            <input type="text" value="${p.first_name || ''}" readonly tabindex="-1" style="opacity:.65; cursor:not-allowed">
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" value="${p.last_name || ''}" readonly tabindex="-1" style="opacity:.65; cursor:not-allowed">
          </div>
        </div>
        <p style="color:var(--muted); font-size:.78rem; margin:-6px 0 14px">Name wrong? Ask an officer to correct it.</p>
        <div class="field">
          <label for="alias">Alias (optional, must be unique)</label>
          <input type="text" id="alias" value="${p.alias || ''}" maxlength="24" placeholder="what people call you">
        </div>
        <div class="field">
          <label for="majors-in">Major(s)</label>
          <div class="ac-pick" id="majors-pick">
            <div class="ac-chips"></div>
            <input type="text" id="majors-in" placeholder="search UMKC majors…" autocomplete="off">
            <div class="ac-menu"></div>
          </div>
        </div>
        <div class="field">
          <label for="minors-in">Minor(s)</label>
          <div class="ac-pick" id="minors-pick">
            <div class="ac-chips"></div>
            <input type="text" id="minors-in" placeholder="search UMKC minors…" autocomplete="off">
            <div class="ac-menu"></div>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="grad-term">Expected graduation</label>
            <select id="grad-term">
              <option value="">— semester —</option>
              ${['Spring', 'Summer', 'Fall'].map(t => `<option ${p.grad_term === t ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label for="grad-year">&nbsp;</label>
            <select id="grad-year">
              <option value="">— year —</option>
              ${Array.from({ length: 9 }, (_, i) => 2025 + i).map(y => `<option ${p.grad_year === y ? 'selected' : ''}>${y}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field">
          <label for="pic">Profile picture (JPG/PNG — large photos are shrunk automatically)</label>
          <input type="file" id="pic" accept="image/png,image/jpeg,image/webp">
        </div>
        <button class="btn" id="save" type="submit">Save changes</button>
      </form>
    </div>`;

  const notice = document.getElementById('notice');
  const say = (msg, cls) => { notice.textContent = msg; notice.className = `notice ${cls}`; };

  const acadLine = (q) => [
    (q.majors || '').split('; ').filter(Boolean).join(', '),
    q.minors ? `minor: ${q.minors.split('; ').join(', ')}` : '',
    q.grad_term && q.grad_year ? `Class of ${q.grad_term} ${q.grad_year}` : '',
  ].filter(Boolean).join(' · ');
  const renderAcad = (q) => {
    const el = document.getElementById('acad-line');
    const s = acadLine(q);
    el.textContent = s ? `🎓 ${s}` : '';
    el.style.display = s ? '' : 'none';
  };
  renderAcad(p);

  // searchable chip pickers backed by the curated academic_programs
  // table — free text never reaches the profile (a DB trigger rejects
  // anything off-list as a backstop)
  const { data: programs } = await supabase.from('academic_programs')
    .select('name, is_major, is_minor, degree_types').order('name');
  const DEGREES = {
    BA: 'Bachelor of Arts', BS: 'Bachelor of Science', BBA: 'Bachelor of Business Administration',
    BFA: 'Bachelor of Fine Arts', BM: 'Bachelor of Music', BME: 'Bachelor of Music Education',
    BSN: 'Bachelor of Science in Nursing', BArch: 'Bachelor of Architecture',
    BIT: 'Bachelor of Information Technology', BHS: 'Bachelor of Health Sciences',
    BLA: 'Bachelor of Liberal Arts',
  };
  // options: [{name, types}] — a program with several degree types asks
  // which one after you pick it; a single type is appended automatically
  function chipPicker(rootId, options, initial) {
    const root = document.getElementById(rootId);
    const chips = root.querySelector('.ac-chips');
    const input = root.querySelector('input');
    const menu = root.querySelector('.ac-menu');
    const baseOf = (v) => v.replace(/ \([A-Za-z]+\)$/, '');
    const selected = initial.filter(v => options.some(o => o.name === baseOf(v)));
    const draw = () => {
      chips.innerHTML = selected.map(v =>
        `<span class="ac-chip">${v}<button type="button" data-x="${v}" aria-label="Remove ${v}">×</button></span>`).join('');
      chips.querySelectorAll('[data-x]').forEach(b => b.onclick = () => {
        selected.splice(selected.indexOf(b.dataset.x), 1); draw();
      });
    };
    const add = (entry) => { selected.push(entry); input.value = ''; draw(); input.focus(); openMenu(); };
    const askType = (opt) => {
      menu.innerHTML = `<div class="none">${opt.name} — which degree?</div>`
        + opt.types.map(t => `<button type="button" data-t="${t}">${t} — ${DEGREES[t] || t}</button>`).join('');
      menu.querySelectorAll('[data-t]').forEach(b => b.onclick = () => add(`${opt.name} (${b.dataset.t})`));
      menu.classList.add('open');
    };
    const openMenu = () => {
      const q = input.value.trim().toLowerCase();
      const hits = options.filter(o => !selected.some(v => baseOf(v) === o.name)
        && o.name.toLowerCase().includes(q)).slice(0, 30);
      menu.innerHTML = hits.length
        ? hits.map((o, i) => `<button type="button" data-i="${i}">${o.name}</button>`).join('')
        : '<div class="none">No matching program.</div>';
      menu.querySelectorAll('[data-i]').forEach(b => b.onclick = () => {
        const opt = hits[+b.dataset.i];
        if (opt.types.length > 1) askType(opt);
        else add(opt.types.length ? `${opt.name} (${opt.types[0]})` : opt.name);
      });
      menu.classList.add('open');
    };
    input.addEventListener('focus', openMenu);
    input.addEventListener('input', openMenu);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); menu.querySelector('button')?.click(); }
      if (e.key === 'Escape') menu.classList.remove('open');
      if (e.key === 'Backspace' && !input.value && selected.length) { selected.pop(); draw(); openMenu(); }
    });
    document.addEventListener('click', (e) => { if (!root.contains(e.target)) menu.classList.remove('open'); });
    draw();
    return { value: () => selected.join('; ') || null };
  }
  const majorsPick = chipPicker('majors-pick',
    (programs || []).filter(x => x.is_major).map(x => ({ name: x.name, types: x.degree_types || [] })),
    (p.majors || '').split('; ').filter(Boolean));
  const minorsPick = chipPicker('minors-pick',
    (programs || []).filter(x => x.is_minor).map(x => ({ name: x.name, types: [] })),
    (p.minors || '').split('; ').filter(Boolean));

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const alias = document.getElementById('alias').value.trim();
      if (alias && !/^[\p{L}\p{N} .'-]{2,24}$/u.test(alias)) {
        throw new Error('Alias must be 2–24 characters (letters, numbers, spaces).');
      }
      const gradTerm = document.getElementById('grad-term').value || null;
      const gradYear = parseInt(document.getElementById('grad-year').value, 10) || null;
      if (!!gradTerm !== !!gradYear) {
        throw new Error('Pick both a graduation semester and year (or leave both blank).');
      }
      const updates = {
        alias: alias || null,
        majors: majorsPick.value(),
        minors: minorsPick.value(),
        grad_term: gradTerm,
        grad_year: gradYear,
      };

      const file = document.getElementById('pic').files[0];
      if (file) {
        // avatars render small everywhere, so 512px is plenty
        const up = await compressImage(file, 512, 0.85);
        if (up.size > 2 * 1024 * 1024) throw new Error('Image is too large even after compression — try a different photo.');
        const path = `${ctx.user.id}/avatar-${Date.now()}.${outExt(up, file)}`;
        const { error: upErr } = await supabase.storage.from('avatars').upload(path, up, { upsert: true, contentType: up.type || file.type });
        if (upErr) throw upErr;
        if (ctx.profile?.avatar_path) {
          await supabase.storage.from('avatars').remove([ctx.profile.avatar_path]);
        }
        updates.avatar_path = path;
      }

      const { error } = await supabase.from('profiles').update(updates).eq('id', ctx.user.id);
      if (error) {
        if (error.code === '23505') throw new Error('That alias is already taken — pick another.');
        throw error;
      }

      say('Profile saved!', 'ok');
      Object.assign(ctx.profile, updates);
      renderAcad(ctx.profile);
      ctx.profile.alias = updates.alias;
      document.getElementById('head-name').innerHTML =
        `${ctx.profile.full_name || 'Member'}${updates.alias ? ` <span style="color:var(--gold); font-size:1.05rem">“${updates.alias}”</span>` : ''}`;
      if (updates.avatar_path) {
        document.getElementById('avatar').src = AVATAR_BASE + updates.avatar_path;
        ctx.profile.avatar_path = updates.avatar_path;
      }
    } catch (err) {
      say(err.message || String(err), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save changes';
    }
  });
</script>
</body>
</html>
