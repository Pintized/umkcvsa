<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
</head>
<body>
<div class="loading" id="loading">Loading inventory…</div>
<script type="module">
  import { requireOfficer } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';
  import { compressImage, outExt } from '/app/shared/img.js';

  const INV_IMG = 'https://wrlpsetbkeyoyamkopgf.supabase.co/storage/v1/object/public/inventory-images/';
  const ctx = await requireOfficer();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'Inventory');

  let items = [], people = [];
  let catFilter = 'all', lowOnly = false;
  const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  const nameOf = (uid) => people.find(p => p.id === uid)?.full_name || 'Unknown';

  async function load() {
    const [invRes, pplRes] = await Promise.all([
      supabase.from('inventory').select('*').order('name'),
      supabase.from('profiles').select('id, full_name'),
    ]);
    items = invRes.data || [];
    people = pplRes.data || [];
    render();
  }

  // every quantity change lands in the append-only history
  async function logChange(item, delta, reason) {
    await supabase.from('inventory_log').insert({
      item_id: item.id, user_id: ctx.user.id,
      delta, new_quantity: item.quantity, reason: reason || null,
    });
  }

  function render() {
    const q = (document.getElementById('search')?.value || '').toLowerCase();
    const cats = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
    const low = items.filter(i => i.quantity <= i.low_stock_threshold).length;
    if (catFilter !== 'all' && !cats.includes(catFilter)) catFilter = 'all';

    const rows = items
      .filter(i => catFilter === 'all' || i.category === catFilter)
      .filter(i => !lowOnly || i.quantity <= i.low_stock_threshold)
      .filter(i => !q || i.name.toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q) || (i.location || '').toLowerCase().includes(q))
      .map(i => `
        <tr class="${i.quantity <= i.low_stock_threshold ? 'low' : ''}">
          <td style="width:48px">${i.photo_path
            ? `<img src="${INV_IMG + i.photo_path}" style="width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid var(--line)">`
            : ''}</td>
          <td><strong>${esc(i.name)}</strong>${i.notes ? `<br><small style="color:var(--muted)">${esc(i.notes)}</small>` : ''}</td>
          <td>${esc(i.category)}</td>
          <td>
            <span class="qty-ctl">
              <button data-adj="${i.id}" data-d="-1">−</button>
              <button class="q link-btn" data-adjust="${i.id}" title="Adjust with a reason" style="text-decoration:none">${i.quantity}</button>
              <button data-adj="${i.id}" data-d="1">+</button>
            </span> ${esc(i.unit)}
          </td>
          <td>${esc(i.location)}</td>
          <td>${i.low_stock_threshold}</td>
          <td class="actions">
            <button class="btn sm ghost" data-hist="${i.id}" title="Quantity history">History</button>
            <button class="btn sm secondary" data-edit="${i.id}">Edit</button>
            <button class="btn sm ghost" data-del="${i.id}">Delete</button>
          </td>
        </tr>`).join('');

    page.innerHTML = `
      <div class="card">
        <h2>Overview</h2>
        <div class="stat-grid">
          <div class="stat"><div class="num">${items.length}</div><div class="lbl">Items tracked</div></div>
          <div class="stat"><div class="num">${items.reduce((s, i) => s + i.quantity, 0)}</div><div class="lbl">Total units</div></div>
          <div class="stat"><div class="num" style="${low ? 'color:var(--red)' : ''}">${low}</div><div class="lbl">Low stock</div></div>
        </div>
      </div>
      <div class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px">
          <input class="searchbar" id="search" type="search" placeholder="Search items…" value="${esc(q)}" style="margin:0">
          <button class="btn" id="new">+ Add item</button>
        </div>
        <div class="filter-bar" style="margin-bottom:12px">
          <button class="chip-btn ${catFilter === 'all' ? 'on' : ''}" data-cat="all">All</button>
          ${cats.map(c => `<button class="chip-btn ${catFilter === c ? 'on' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}
          <button class="chip-btn warn-chip ${lowOnly ? 'on' : ''}" id="low-only" style="margin-left:auto">Low stock only</button>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th></th><th>Item</th><th>Category</th><th>Quantity</th><th>Location</th><th>Low-stock at</th><th></th></tr></thead>
            <tbody>${rows || `<tr><td colspan="7" style="color:var(--muted)">${items.length ? 'Nothing matches these filters.' : 'Nothing tracked yet.'}</td></tr>`}</tbody>
          </table>
        </div>
        <p style="color:var(--muted); font-size:.8rem; margin-top:10px">Tip: click a quantity number to adjust by any amount with a reason — every change is logged under History.</p>
      </div>`;

    document.getElementById('new').onclick = () => openModal();
    document.getElementById('search').oninput = render;
    document.getElementById('low-only').onclick = () => { lowOnly = !lowOnly; render(); };
    page.querySelectorAll('[data-cat]').forEach(b => b.onclick = () => { catFilter = b.dataset.cat; render(); });
    page.querySelectorAll('[data-adj]').forEach(b => b.onclick = async () => {
      const it = items.find(i => i.id === +b.dataset.adj);
      const prev = it.quantity;
      const nq = Math.max(0, prev + Number(b.dataset.d));
      if (nq === prev) return;
      const { error } = await supabase.from('inventory').update({ quantity: nq }).eq('id', it.id);
      if (error) { alert(error.message); return; }
      it.quantity = nq;
      logChange(it, nq - prev, null);
      render();
    });
    page.querySelectorAll('[data-adjust]').forEach(b => b.onclick = () => openAdjustModal(items.find(i => i.id === +b.dataset.adjust)));
    page.querySelectorAll('[data-hist]').forEach(b => b.onclick = () => openHistoryModal(items.find(i => i.id === +b.dataset.hist)));
    page.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openModal(items.find(i => i.id === +b.dataset.edit)));
    page.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const it = items.find(i => i.id === +b.dataset.del);
      if (!confirm(`Remove "${it.name}" from inventory? Its history goes with it.`)) return;
      const { error } = await supabase.from('inventory').delete().eq('id', it.id);
      if (error) { alert(error.message); return; }
      if (it.photo_path) await supabase.storage.from('inventory-images').remove([it.photo_path]);
      load();
    });
  }

  // ----- adjust by N with a reason -----
  function openAdjustModal(it) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>Adjust — ${esc(it.name)}</h2>
        <p style="color:var(--muted); font-size:.85rem; margin-bottom:10px">
          Currently <strong>${it.quantity} ${esc(it.unit)}</strong>. Use a negative number for taking stock out.</p>
        <div class="notice" id="m-notice"></div>
        <form id="adj-form">
          <div class="field-row">
            <div class="field"><label>Change by</label><input type="number" id="f-delta" required placeholder="e.g. -5 or 20"></div>
          </div>
          <div class="field"><label>Reason (optional)</label><input id="f-reason" placeholder="e.g. taken for Tết booth, new shipment…"></div>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="m-cancel">Cancel</button>
            <button type="submit" class="btn">Apply</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(back);
    back.querySelector('#m-cancel').onclick = () => back.remove();
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
    back.querySelector('#f-delta').focus();

    back.querySelector('#adj-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const say = (m) => { const n = back.querySelector('#m-notice'); n.textContent = m; n.className = 'notice error'; };
      const delta = Math.trunc(Number(back.querySelector('#f-delta').value));
      if (!delta) return say('Enter a non-zero amount.');
      const nq = it.quantity + delta;
      if (nq < 0) return say(`That would go below zero — only ${it.quantity} in stock.`);
      const { error } = await supabase.from('inventory').update({ quantity: nq }).eq('id', it.id);
      if (error) return say(error.message);
      it.quantity = nq;
      await logChange(it, delta, back.querySelector('#f-reason').value.trim());
      back.remove();
      render();
    });
  }

  // ----- per-item history -----
  async function openHistoryModal(it) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>History — ${esc(it.name)}</h2>
        <div id="hist-body" style="color:var(--muted)">Loading…</div>
        <div class="row-btns"><button type="button" class="btn ghost" id="m-cancel">Close</button></div>
      </div>`;
    document.body.appendChild(back);
    back.querySelector('#m-cancel').onclick = () => back.remove();
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });

    const { data, error } = await supabase.from('inventory_log')
      .select('*').eq('item_id', it.id)
      .order('created_at', { ascending: false }).limit(100);
    const body = back.querySelector('#hist-body');
    if (error) { body.textContent = error.message; return; }
    if (!data.length) { body.textContent = 'No quantity changes recorded yet.'; return; }
    body.style.color = '';
    body.innerHTML = `
      <div class="tbl-wrap" style="max-height:340px; overflow:auto">
        <table class="tbl">
          <thead><tr><th>When</th><th>Change</th><th>Left</th><th>By</th><th>Reason</th></tr></thead>
          <tbody>${data.map(l => `
            <tr>
              <td>${new Date(l.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}</td>
              <td style="font-weight:700; color:${l.delta > 0 ? 'var(--ok)' : 'var(--red)'}">${l.delta > 0 ? '+' : ''}${l.delta}</td>
              <td>${l.new_quantity}</td>
              <td>${esc(nameOf(l.user_id))}</td>
              <td>${esc(l.reason) || '<span style="color:var(--muted)">—</span>'}</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`;
  }

  // ----- add / edit -----
  function openModal(it) {
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = `
      <div class="modal">
        <h2>${it ? 'Edit item' : 'Add item'}</h2>
        <div class="notice" id="m-notice"></div>
        <form id="i-form">
          <div class="field"><label>Name</label><input id="f-name" required value="${esc(it?.name)}"></div>
          <div class="field-row">
            <div class="field"><label>Category</label><input id="f-cat" value="${esc(it?.category)}"></div>
            <div class="field"><label>Unit</label><input id="f-unit" placeholder="shirts, boxes…" value="${esc(it?.unit)}"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Quantity</label><input type="number" id="f-qty" min="0" value="${it?.quantity ?? 0}"></div>
            <div class="field"><label>Low-stock threshold</label><input type="number" id="f-thresh" min="0" value="${it?.low_stock_threshold ?? 0}"></div>
          </div>
          <div class="field"><label>Location</label><input id="f-loc" value="${esc(it?.location)}"></div>
          <div class="field"><label>Notes</label><textarea id="f-notes">${esc(it?.notes)}</textarea></div>
          <div class="field"><label>Photo${it?.photo_path ? ' — picking a new one replaces the current photo' : ''}</label>
            <input type="file" id="f-photo" accept="image/png,image/jpeg,image/webp"></div>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="m-cancel">Cancel</button>
            <button type="submit" class="btn">${it ? 'Save' : 'Add'}</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(back);
    back.querySelector('#m-cancel').onclick = () => back.remove();
    back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });

    back.querySelector('#i-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const say = (m) => { const n = back.querySelector('#m-notice'); n.textContent = m; n.className = 'notice error'; };
      const payload = {
        name: back.querySelector('#f-name').value.trim(),
        category: back.querySelector('#f-cat').value.trim(),
        unit: back.querySelector('#f-unit').value.trim(),
        quantity: Math.max(0, +back.querySelector('#f-qty').value || 0),
        low_stock_threshold: Math.max(0, +back.querySelector('#f-thresh').value || 0),
        location: back.querySelector('#f-loc').value.trim(),
        notes: back.querySelector('#f-notes').value.trim() || null,
      };
      const file = back.querySelector('#f-photo').files[0];
      if (file) {
        if (file.size > 11 * 1024 * 1024) return say('Image is larger than 11 MB.');
        const up = await compressImage(file, 1000, .85);
        const path = `${crypto.randomUUID()}.${outExt(up, file)}`;
        const { error: upErr } = await supabase.storage.from('inventory-images')
          .upload(path, up, { contentType: up.type });
        if (upErr) return say(upErr.message);
        if (it?.photo_path) await supabase.storage.from('inventory-images').remove([it.photo_path]);
        payload.photo_path = path;
      }
      if (it) {
        const { error } = await supabase.from('inventory').update(payload).eq('id', it.id);
        if (error) return say(error.message);
        if (payload.quantity !== it.quantity) {
          await logChange({ ...it, quantity: payload.quantity }, payload.quantity - it.quantity, 'edited item');
        }
      } else {
        const { data, error } = await supabase.from('inventory')
          .insert({ ...payload, created_by: ctx.user.id }).select('*').single();
        if (error) return say(error.message);
        if (data.quantity > 0) await logChange(data, data.quantity, 'initial stock');
      }
      back.remove();
      load();
    });
  }

  await load();
</script>
</body>
</html>
