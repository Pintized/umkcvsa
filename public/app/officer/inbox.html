<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700&family=Roboto+Mono:wght@400;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<style>
  .inbox-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
  .inbox-tabs .tab {
    padding: 7px 14px; border-radius: 99px; cursor: pointer; font-size: .88rem;
    border: 1px solid rgba(128,128,128,.3); background: transparent; color: inherit;
  }
  .inbox-tabs .tab.on { background: rgba(200,32,47,.12); border-color: var(--gold, #e0b45c); font-weight: 700; }
  .inbox-wrap { display: grid; grid-template-columns: 340px 1fr; gap: 18px; align-items: start; }
  .mail-list { max-height: 68vh; overflow-y: auto; padding: 0; }
  .mail-row { padding: 12px 14px; border-bottom: 1px solid rgba(128,128,128,.2); cursor: pointer; display: flex; gap: 8px; align-items: flex-start; }
  .mail-row:hover { background: rgba(128,128,128,.08); }
  .mail-row.sel { background: rgba(200,32,47,.08); border-left: 3px solid var(--gold, #e0b45c); }
  .mail-row .rw { flex: 1; min-width: 0; }
  .mail-row .m-from { font-weight: 700; font-size: .92rem; display: flex; justify-content: space-between; gap: 8px; }
  .mail-row.is-read .m-from { font-weight: 400; opacity: .8; }
  .mail-row .m-subj { font-size: .88rem; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mail-row.is-read .m-subj { opacity: .7; }
  .mail-row .m-date { font-size: .75rem; opacity: .6; white-space: nowrap; }
  .m-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c8202f; margin-right: 6px; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 1.05rem; padding: 0 2px; opacity: .45; color: inherit; }
  .star-btn.on { opacity: 1; color: #e0b45c; }
  .mail-view .mv-head { border-bottom: 1px solid rgba(128,128,128,.25); padding-bottom: 12px; margin-bottom: 14px; }
  .mail-view .mv-meta { font-size: .85rem; opacity: .75; margin-top: 4px; }
  .mv-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .mail-body { line-height: 1.55; font-size: .95rem; max-height: 42vh; overflow-y: auto; white-space: pre-wrap; }
  .mail-body iframe { width: 100%; min-height: 340px; border: 0; background: transparent; border-radius: 8px; }
  .compose-fields input {
    width: 100%; padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
    border: 1px solid rgba(128,128,128,.35); background: transparent; color: inherit; font: inherit;
  }
  .inbox-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .empty { opacity: .6; text-align: center; padding: 48px 12px; }
  .pill { font-size: .72rem; padding: 2px 8px; border-radius: 99px; background: rgba(63,127,191,.18); }
  .sched-row { display: none; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sched-row.show { display: flex; }
  .hint { font-size: .78rem; opacity: .6; }
  @media (max-width: 900px) { .inbox-wrap { grid-template-columns: 1fr; } }

  /* ---------- rich text editor ---------- */
  .rt-wrap { border: 1px solid rgba(128,128,128,.35); border-radius: 10px; margin-bottom: 8px; }
  .rt-bar {
    display: flex; flex-wrap: wrap; gap: 2px; padding: 6px; align-items: center;
    border-bottom: 1px solid rgba(128,128,128,.25); position: relative;
  }
  .rt-dd { position: relative; display: inline-block; }
  .rt-dd-btn {
    background: transparent; color: inherit; border: 1px solid rgba(128,128,128,.3);
    border-radius: 7px; font-size: .8rem; padding: 4px 8px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; max-width: 130px; white-space: nowrap;
  }
  .rt-dd-btn::after { content: '▾'; opacity: .5; font-size: .7rem; }
  .rt-dd-btn:hover { background: rgba(128,128,128,.12); }
  .rt-dd-menu {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 30; min-width: 160px;
    background: Canvas; color: CanvasText; border: 1px solid rgba(128,128,128,.35);
    border-radius: 10px; padding: 5px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,.35);
    max-height: 260px; overflow-y: auto;
  }
  .rt-dd-menu.show { display: block; }
  .rt-dd-menu button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: inherit; cursor: pointer; padding: 6px 10px; border-radius: 7px; font-size: .9rem;
  }
  .rt-dd-menu button:hover { background: rgba(200,32,47,.14); }
  .rt-dd-menu button.cur { background: rgba(200,32,47,.1); font-weight: 700; }
  .rt-btn {
    background: none; border: none; color: inherit; cursor: pointer; border-radius: 7px;
    min-width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
    font-size: .9rem; opacity: .85; padding: 0 4px;
  }
  .rt-btn:hover { background: rgba(128,128,128,.15); }
  .rt-btn.on { background: rgba(200,32,47,.16); opacity: 1; }
  .rt-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .rt-sep { width: 1px; height: 20px; background: rgba(128,128,128,.3); margin: 0 4px; }
  .rt-color { position: relative; display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; cursor: pointer; border-radius: 7px; font-weight: 700; font-size: .9rem; }
  .rt-color:hover { background: rgba(128,128,128,.15); }
  .rt-color input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .rt-color .swatch { position: absolute; bottom: 3px; left: 7px; right: 7px; height: 3px; border-radius: 2px; background: #c8202f; }
  .rt-area {
    min-height: 160px; max-height: 40vh; overflow-y: auto; padding: 12px 14px; outline: none;
    font-size: .95rem; line-height: 1.55;
  }
  .rt-area:empty::before { content: attr(data-placeholder); opacity: .45; }
  .rt-area blockquote { border-left: 3px solid rgba(128,128,128,.45); margin: 6px 0; padding-left: 10px; opacity: .85; }
  .rt-area img { max-width: 100%; height: auto; border-radius: 6px; }
  .rt-area a { color: #3f7fbf; }
  .emoji-pop {
    position: absolute; top: 40px; left: 0; z-index: 30; background: var(--card-bg, #16324f);
    border: 1px solid rgba(128,128,128,.35); border-radius: 12px; padding: 8px;
    display: none; grid-template-columns: repeat(8, 30px); gap: 2px;
    box-shadow: 0 10px 30px rgba(0,0,0,.35); background: Canvas; color: CanvasText;
  }
  .emoji-pop.show { display: grid; }
  .emoji-pop button { background: none; border: none; font-size: 1.15rem; cursor: pointer; border-radius: 6px; padding: 2px; }
  .emoji-pop button:hover { background: rgba(128,128,128,.2); }
  .link-pop {
    position: absolute; top: 40px; right: 0; z-index: 30; width: 300px;
    background: Canvas; color: CanvasText; border: 1px solid rgba(128,128,128,.35);
    border-radius: 12px; padding: 12px; display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .link-pop.show { display: block; }
  .link-pop label { font-size: .75rem; opacity: .65; display: block; margin: 0 0 3px; }
  .link-pop input {
    width: 100%; padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; font-size: .85rem;
    border: 1px solid rgba(128,128,128,.35); background: transparent; color: inherit; font-family: inherit;
  }
  .link-pop .lp-row { display: flex; gap: 6px; justify-content: flex-end; }
  .att-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .att-chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: .8rem;
    border: 1px solid rgba(128,128,128,.35); border-radius: 99px; padding: 4px 10px;
  }
  .att-chip button { background: none; border: none; color: inherit; cursor: pointer; opacity: .6; font-size: .9rem; }
  .att-chip button:hover { opacity: 1; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading inbox…</div>
<script type="module">
  import { requireOfficer } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';
  import { SUPABASE_URL } from '/app/shared/config.js';

  const ctx = await requireOfficer();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'Inbox');

  const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  const fmt = (d) => d ? new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';

  const TABS = [
    { key: 'inbox',     label: 'Inbox' },
    { key: 'starred',   label: '★ Starred' },
    { key: 'sent',      label: 'Sent' },
    { key: 'draft',     label: 'Drafts' },
    { key: 'scheduled', label: 'Scheduled' },
    { key: 'spam',      label: 'Spam' },
    { key: 'trash',     label: 'Trash' },
  ];
  const EMPTY_TEXT = {
    inbox: 'No mail yet — messages sent to support@umkcvsa.org (or any @umkcvsa.org address) will appear here.',
    starred: 'Nothing starred. Star inbox messages with the ★ to pin them here.',
    sent: 'Nothing sent yet.',
    draft: 'No drafts. Compose something and hit "Save draft".',
    scheduled: 'Nothing scheduled. Compose and pick "Schedule" to send later.',
    spam: 'No spam. Lucky you.',
    trash: 'Trash is empty. Items here delete forever after 30 days.',
  };

  let tab = 'inbox', emails = [], sel = null, composing = false, draft = null;
  let attFiles = []; // File objects staged for the current compose

  async function load() {
    let q = supabase.from('inbox_emails').select('*').limit(200);
    if (tab === 'starred') q = q.eq('folder', 'inbox').eq('starred', true);
    else q = q.eq('folder', tab);
    q = tab === 'scheduled'
      ? q.order('scheduled_at', { ascending: true })
      : q.order('received_at', { ascending: false });
    const { data, error } = await q;
    emails = error ? [] : (data || []);
    if (error) console.error(error);
    render();
  }

  async function send(payload) {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/inbox-send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify(payload),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || `Send failed (${res.status})`);
    return body;
  }

  async function setFields(id, fields) {
    const { error } = await supabase.from('inbox_emails').update(fields).eq('id', id);
    if (error) { alert(error.message); return false; }
    return true;
  }

  function rowMeta(e) {
    if (tab === 'sent' || e.folder === 'sent') return `To: ${esc(e.to_addr || '')}`;
    if (e.folder === 'draft') return `Draft · To: ${esc(e.to_addr || '(no recipient)')}`;
    if (e.folder === 'scheduled') return `⏱ ${fmt(e.scheduled_at)} · To: ${esc(e.to_addr || '')}`;
    return esc(e.from_name || e.from_addr);
  }

  // ================= rich text editor =================
  const I = (d) => `<svg viewBox="0 0 24 24">${d}</svg>`;
  const ICONS = {
    alignL: I('<path d="M4 6h16M4 10h10M4 14h16M4 18h10"/>'),
    alignC: I('<path d="M4 6h16M7 10h10M4 14h16M7 18h10"/>'),
    alignR: I('<path d="M4 6h16M10 10h10M4 14h16M10 18h10"/>'),
    ol: I('<path d="M10 6h10M10 12h10M10 18h10M4 5h1.5v3M4 8h3M4.2 12.6c1.6-1.8 3-.4 1.6 1L4 15.4h3.4M4 17.6h2.2a1.1 1.1 0 0 1 0 2.2H5.2a1.1 1.1 0 0 0 0 2.2H7.6" transform="scale(.92) translate(.5 -1.2)"/>'),
    ul: I('<path d="M9 6h11M9 12h11M9 18h11"/><circle cx="5" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1.4" fill="currentColor" stroke="none"/>'),
    outdent: I('<path d="M4 6h16M11 10h9M11 14h9M4 18h16M8 9.5 5 12l3 2.5"/>'),
    indent: I('<path d="M4 6h16M11 10h9M11 14h9M4 18h16M5 9.5 8 12l-3 2.5"/>'),
    quote: I('<path d="M6 15a3.5 3.5 0 0 1 0-7v2.2A1.8 1.8 0 0 0 6 13v2ZM14 15a3.5 3.5 0 0 1 0-7v2.2a1.8 1.8 0 0 0 0 2.8v2Z" fill="currentColor" stroke="none"/>'),
    clear: I('<path d="M6 6 18 18M13 5h6M9.5 5 7 19"/>'),
    link: I('<path d="M10 14a4 4 0 0 0 5.6.4l2.6-2.6a4 4 0 0 0-5.6-5.6L11 7.7"/><path d="M14 10a4 4 0 0 0-5.6-.4L5.8 12.2a4 4 0 0 0 5.6 5.6L13 16.3"/>'),
    image: I('<rect x="3.6" y="5" width="16.8" height="14" rx="2"/><circle cx="8.6" cy="9.6" r="1.6"/><path d="m5 17 4.6-4.6 3.2 3.2 2.6-2.6L20.4 17"/>'),
    attach: I('<path d="m20 11-7.6 7.6a5 5 0 0 1-7-7L13 4a3.4 3.4 0 0 1 4.8 4.8L10.6 16a1.8 1.8 0 0 1-2.6-2.6l6.6-6.6"/>'),
  };
  // Font list and pixel-size range cloned from the Notes editor
  const FONTS = [
    ['Source Sans', "'Source Sans 3', sans-serif"],
    ['Playfair Display', "'Playfair Display', serif"],
    ['Lora', 'Lora, serif'],
    ['Merriweather', 'Merriweather, serif'],
    ['Montserrat', 'Montserrat, sans-serif'],
    ['Georgia', 'Georgia, serif'],
    ['Times New Roman', "'Times New Roman', serif"],
    ['Arial', 'Arial, sans-serif'],
    ['Verdana', 'Verdana, sans-serif'],
    ['Trebuchet MS', "'Trebuchet MS', sans-serif"],
    ['Tahoma', 'Tahoma, sans-serif'],
    ['Roboto Mono', "'Roboto Mono', monospace"],
    ['Courier New', "'Courier New', monospace"],
    ['Dancing Script', "'Dancing Script', cursive"],
    ['Comic Sans', "'Comic Sans MS', cursive"],
    ['Impact', 'Impact, sans-serif'],
  ];
  const SIZES = Array.from({ length: 18 }, (_, i) => 6 + i * 2); // 6–40 px
  const EMOJI = ['🌸','🎉','😀','😄','😊','😉','😍','🥰','😎','🤩','😅','😂','🥲','🙏','👏','👍','🙌','💪','🔥','✨','⭐','💛','❤️','💙','🍜','🥟','🧋','🍚','🏮','🧧','🎊','📣','📅','✅','❗','❓','🫶','🤝','🎓','🌟'];

  function editorHTML(id, placeholder) {
    return `
    <div class="rt-wrap">
      <div class="rt-bar" id="${id}-bar">
        <div class="rt-dd" data-dd="fontName">
          <button type="button" class="rt-dd-btn" title="Font"><span class="rt-dd-label">Font</span></button>
          <div class="rt-dd-menu">
            ${FONTS.map(([label, stack]) => `<button type="button" data-v="${esc(stack)}" style="font-family:${esc(stack)}">${label}</button>`).join('')}
          </div>
        </div>
        <div class="rt-dd" data-dd="fontSize">
          <button type="button" class="rt-dd-btn" title="Text size (px)"><span class="rt-dd-label">Size</span></button>
          <div class="rt-dd-menu" style="min-width:76px">
            ${SIZES.map(px => `<button type="button" data-v="${px}">${px}</button>`).join('')}
          </div>
        </div>
        <span class="rt-sep"></span>
        <button class="rt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="rt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="rt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <button class="rt-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
        <label class="rt-color" title="Text color">A<span class="swatch"></span>
          <input type="color" value="#c8202f" data-cmd="foreColor"></label>
        <span class="rt-sep"></span>
        <button class="rt-btn" data-cmd="justifyLeft" title="Align left">${ICONS.alignL}</button>
        <button class="rt-btn" data-cmd="justifyCenter" title="Align center">${ICONS.alignC}</button>
        <button class="rt-btn" data-cmd="justifyRight" title="Align right">${ICONS.alignR}</button>
        <span class="rt-sep"></span>
        <button class="rt-btn" data-cmd="insertOrderedList" title="Numbered list">${ICONS.ol}</button>
        <button class="rt-btn" data-cmd="insertUnorderedList" title="Bulleted list">${ICONS.ul}</button>
        <button class="rt-btn" data-cmd="outdent" title="Indent less">${ICONS.outdent}</button>
        <button class="rt-btn" data-cmd="indent" title="Indent more">${ICONS.indent}</button>
        <button class="rt-btn" data-act="quote" title="Quote">${ICONS.quote}</button>
        <span class="rt-sep"></span>
        <button class="rt-btn" data-act="clear" title="Remove formatting">${ICONS.clear}</button>
        <button class="rt-btn" data-act="link" title="Insert link">${ICONS.link}</button>
        <button class="rt-btn" data-act="emoji" title="Insert emoji">😊</button>
        <button class="rt-btn" data-act="image" title="Insert photo">${ICONS.image}</button>
        <button class="rt-btn" data-act="attach" title="Attach files">${ICONS.attach}</button>
        <div class="emoji-pop" id="${id}-emoji">${EMOJI.map(e => `<button type="button">${e}</button>`).join('')}</div>
        <div class="link-pop" id="${id}-linkpop">
          <label for="${id}-linktext">Text to display</label>
          <input type="text" id="${id}-linktext" placeholder="(uses the link if empty)">
          <label for="${id}-linkurl">Link URL</label>
          <input type="url" id="${id}-linkurl" placeholder="https://example.com">
          <div class="lp-row">
            <button class="btn ghost sm" type="button" data-lp="cancel">Cancel</button>
            <button class="btn sm" type="button" data-lp="apply">Insert link</button>
          </div>
        </div>
        <input type="file" id="${id}-imgfile" accept="image/*" style="display:none">
        <input type="file" id="${id}-attfile" multiple style="display:none">
      </div>
      <div class="rt-area rt-content" id="${id}" contenteditable="true" data-placeholder="${esc(placeholder)}"></div>
    </div>
    <div class="att-chips" id="${id}-chips"></div>`;
  }

  function wireEditor(id, { withAttachments = true } = {}) {
    const area = document.getElementById(id);
    const bar = document.getElementById(`${id}-bar`);
    const pop = document.getElementById(`${id}-emoji`);
    const linkPop = document.getElementById(`${id}-linkpop`);
    let savedRange = null;

    const closePops = (except) => {
      if (except !== pop) pop.classList.remove('show');
      if (except !== linkPop) linkPop.classList.remove('show');
      bar.querySelectorAll('.rt-dd-menu.show').forEach(m => { if (m !== except) m.classList.remove('show'); });
    };

    const saveSel = () => {
      const s = document.getSelection();
      if (s.rangeCount && area.contains(s.anchorNode)) savedRange = s.getRangeAt(0).cloneRange();
    };
    const restoreSel = () => {
      area.focus();
      if (savedRange) { const s = document.getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
    };
    area.addEventListener('keyup', saveSel);
    area.addEventListener('mouseup', saveSel);
    area.addEventListener('blur', saveSel);

    // List system cloned from the Notes editor: nested lists up to 10 levels,
    // Tab/Shift+Tab (and the toolbar buttons) walk the nesting, Tab in plain
    // text types spacing, and Tab never moves focus out of the editor.
    area.addEventListener('focus', () => document.execCommand('styleWithCSS', false, true));
    const MAX_LIST_DEPTH = 10;
    const curLi = () => {
      const s = document.getSelection();
      if (!s?.anchorNode) return null;
      const el = s.anchorNode.nodeType === 1 ? s.anchorNode : s.anchorNode.parentElement;
      const li = el?.closest('li');
      return li && area.contains(li) ? li : null;
    };
    const listDepth = (li) => {
      let d = 0;
      for (let p = li.parentElement; p && p !== area; p = p.parentElement) {
        if (p.tagName === 'UL' || p.tagName === 'OL') d++;
      }
      return d;
    };
    // returns false when the caret isn't in a list (caller may fall back)
    function indentList(dir) {
      const li = curLi();
      if (!li) return false;
      if (dir > 0 && listDepth(li) >= MAX_LIST_DEPTH) return true; // cap reached — swallow
      // styleWithCSS off so indent nests the list instead of styling margins
      document.execCommand('styleWithCSS', false, false);
      document.execCommand(dir > 0 ? 'indent' : 'outdent');
      document.execCommand('styleWithCSS', false, true);
      saveSel(); refresh();
      return true;
    }
    area.addEventListener('keydown', (e) => {
      if (e.key !== 'Tab') return;
      e.preventDefault(); // Tab never leaves the editor
      if (indentList(e.shiftKey ? -1 : 1)) return;
      // plain text: Tab types spacing instead of jumping focus away
      if (!e.shiftKey) document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
      saveSel();
    });

    // ---- pixel font sizes, cloned from Notes ----
    // execCommand('fontSize') materializes as EITHER <font size=N> or a span
    // with a KEYWORD size depending on styleWithCSS at insertion time — so we
    // normalize both forms to the exact px everywhere.
    const LEGACY_SIZE = { 1: 10, 2: 13, 3: 16, 4: 18, 5: 24, 6: 32, 7: 48 };
    const KEYWORD_PX = {
      'x-small': 10, 'small': 13, 'medium': 16, 'large': 18,
      'x-large': 24, 'xx-large': 32, 'xxx-large': 48, '-webkit-xxx-large': 48,
    };
    let typingSizePx = null; // sticky user-chosen size; stays the typing size until a new size is picked
    const normalizeSizes = (root, forcePx) => {
      root.querySelectorAll('font[size]').forEach(f => {
        const px = forcePx || LEGACY_SIZE[f.getAttribute('size')] || 16;
        f.removeAttribute('size');
        f.style.fontSize = px + 'px';
      });
      root.querySelectorAll('span[style], font[style]').forEach(el => {
        if (KEYWORD_PX[el.style.fontSize]) {
          el.style.fontSize = (forcePx || KEYWORD_PX[el.style.fontSize]) + 'px';
        }
      });
    };
    // freshly created size elements become the sticky px on the next input
    area.addEventListener('input', () => { if (typingSizePx) normalizeSizes(area, +typingSizePx); });
    // sticky size: re-applied just-in-time whenever a keystroke would land at any other size
    area.addEventListener('beforeinput', (e) => {
      if (e.inputType !== 'insertText' || !typingSizePx) return;
      const s = document.getSelection();
      if (!s?.anchorNode || !area.contains(s.anchorNode)) return;
      const nd = s.anchorNode.nodeType === 1 ? s.anchorNode : s.anchorNode.parentElement;
      if (Math.round(parseFloat(getComputedStyle(nd).fontSize)) !== +typingSizePx) {
        document.execCommand('fontSize', false, '7');
        // whichever form materializes, the input pass normalizes it to the sticky px
      }
    });
    function setSizePx(px) {
      closePops(); restoreSel();
      typingSizePx = px;
      document.execCommand('fontSize', false, '7');
      normalizeSizes(area, +px);
      saveSel(); refresh();
    }

    const exec = (cmd, val = null) => { closePops(); restoreSel(); document.execCommand(cmd, false, val); saveSel(); refresh(); };

    // toolbar buttons with direct commands
    bar.querySelectorAll('.rt-btn[data-cmd]').forEach(b => {
      b.addEventListener('mousedown', (e) => e.preventDefault()); // keep selection
      b.addEventListener('click', () => {
        const cmd = b.dataset.cmd;
        // indent buttons walk list nesting first, like Tab does
        if (cmd === 'indent' || cmd === 'outdent') {
          closePops(); restoreSel();
          if (indentList(cmd === 'indent' ? 1 : -1)) return;
        }
        exec(cmd);
      });
    });
    // custom dropdowns (font / size)
    bar.querySelectorAll('.rt-dd').forEach(dd => {
      const btn = dd.querySelector('.rt-dd-btn');
      const menu = dd.querySelector('.rt-dd-menu');
      const label = dd.querySelector('.rt-dd-label');
      btn.addEventListener('mousedown', (e) => e.preventDefault()); // keep selection
      btn.addEventListener('click', () => {
        const open = menu.classList.contains('show');
        closePops();
        if (!open) menu.classList.add('show');
      });
      menu.querySelectorAll('button[data-v]').forEach(item => {
        item.addEventListener('mousedown', (e) => e.preventDefault());
        item.addEventListener('click', () => {
          const v = item.dataset.v;
          if (dd.dataset.dd === 'fontName') {
            closePops(); restoreSel();
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('fontName', false, v);
            saveSel(); refresh();
            label.textContent = item.textContent;
            label.style.fontFamily = v;
          } else {
            setSizePx(v);
            label.textContent = item.textContent;
          }
          menu.querySelectorAll('button').forEach(x => x.classList.toggle('cur', x === item));
          menu.classList.remove('show');
        });
      });
    });
    // clicking anywhere outside the toolbar closes any open popover
    document.addEventListener('pointerdown', (e) => {
      if (!bar.contains(e.target)) closePops();
    });
    // color
    const color = bar.querySelector('input[type="color"]');
    color.addEventListener('input', () => {
      bar.querySelector('.swatch').style.background = color.value;
      exec('foreColor', color.value);
    });

    // special actions
    bar.querySelectorAll('.rt-btn[data-act]').forEach(b => {
      b.addEventListener('mousedown', (e) => e.preventDefault());
      b.addEventListener('click', async () => {
        const act = b.dataset.act;
        if (act === 'quote') {
          restoreSel();
          const node = document.getSelection().anchorNode;
          const inQuote = node && (node.nodeType === 1 ? node : node.parentElement)?.closest('blockquote');
          document.execCommand('formatBlock', false, inQuote ? 'div' : 'blockquote');
          saveSel();
        } else if (act === 'clear') {
          restoreSel();
          document.execCommand('removeFormat');
          document.execCommand('unlink');
          saveSel();
        } else if (act === 'link') {
          const open = linkPop.classList.contains('show');
          closePops();
          if (!open) {
            // prefill display text from the current selection
            const selText = savedRange ? savedRange.toString() : '';
            document.getElementById(`${id}-linktext`).value = selText;
            document.getElementById(`${id}-linkurl`).value = '';
            linkPop.classList.add('show');
            setTimeout(() => document.getElementById(`${id}-linkurl`).focus(), 0);
          }
          return;
        } else if (act === 'emoji') {
          const open = pop.classList.contains('show');
          closePops();
          if (!open) pop.classList.add('show');
          return;
        } else if (act === 'image') {
          document.getElementById(`${id}-imgfile`).click();
        } else if (act === 'attach') {
          if (withAttachments) document.getElementById(`${id}-attfile`).click();
          else alert('Attachments are available in Compose.');
        }
        refresh();
      });
    });

    // emoji picks
    pop.querySelectorAll('button').forEach(b => {
      b.addEventListener('mousedown', (e) => e.preventDefault());
      b.addEventListener('click', () => { exec('insertText', b.textContent); pop.classList.remove('show'); });
    });

    // link popover apply/cancel
    linkPop.addEventListener('mousedown', (e) => {
      if (e.target.tagName !== 'INPUT') e.preventDefault(); // keep editor selection, allow typing
    });
    linkPop.querySelector('[data-lp="cancel"]').addEventListener('click', () => linkPop.classList.remove('show'));
    const applyLink = () => {
      let url = document.getElementById(`${id}-linkurl`).value.trim();
      if (!url) { linkPop.classList.remove('show'); return; }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      const textInput = document.getElementById(`${id}-linktext`).value.trim();
      const selText = savedRange ? savedRange.toString() : '';
      linkPop.classList.remove('show');
      restoreSel();
      if (selText && (!textInput || textInput === selText)) {
        document.execCommand('createLink', false, url);
      } else {
        const label = textInput || url;
        const a = `<a href="${url.replace(/"/g, '&quot;')}">${esc(label)}</a>`;
        document.execCommand('insertHTML', false, a);
      }
      saveSel(); refresh();
    };
    linkPop.querySelector('[data-lp="apply"]').addEventListener('click', applyLink);
    document.getElementById(`${id}-linkurl`).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); applyLink(); }
    });

    // inline image upload -> storage -> insert
    document.getElementById(`${id}-imgfile`).addEventListener('change', async (ev) => {
      const file = ev.target.files[0];
      ev.target.value = '';
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { alert('Images up to 5MB please.'); return; }
      const path = `${new Date().getFullYear()}/${crypto.randomUUID()}-${file.name.replace(/[^\w.\-]/g, '_')}`;
      const { error } = await supabase.storage.from('email-assets').upload(path, file);
      if (error) { alert(`Image upload failed: ${error.message}`); return; }
      const { data } = supabase.storage.from('email-assets').getPublicUrl(path);
      exec('insertImage', data.publicUrl);
      // cap the inserted image's display width
      area.querySelectorAll(`img[src="${data.publicUrl}"]`).forEach(img => { img.style.maxWidth = '100%'; });
    });

    // attachments -> chips
    if (withAttachments) {
      document.getElementById(`${id}-attfile`).addEventListener('change', (ev) => {
        for (const f of ev.target.files) {
          if (f.size > 10 * 1024 * 1024) { alert(`${f.name} is over 10MB — too big to attach.`); continue; }
          attFiles.push(f);
        }
        ev.target.value = '';
        renderChips(id);
      });
    }

    // active-state highlighting
    const STATE_CMDS = ['bold', 'italic', 'underline', 'strikeThrough', 'insertOrderedList', 'insertUnorderedList', 'justifyLeft', 'justifyCenter', 'justifyRight'];
    function refresh() {
      for (const cmd of STATE_CMDS) {
        const btn = bar.querySelector(`.rt-btn[data-cmd="${cmd}"]`);
        if (!btn) continue;
        let on = false;
        try { on = document.queryCommandState(cmd); } catch (_) {}
        btn.classList.toggle('on', on);
      }
      // reflect the cursor's font & size in the dropdown labels (Notes-style)
      const fontLabel = bar.querySelector('[data-dd="fontName"] .rt-dd-label');
      const sizeLabel = bar.querySelector('[data-dd="fontSize"] .rt-dd-label');
      const s = document.getSelection();
      const nd = s?.anchorNode && area.contains(s.anchorNode)
        ? (s.anchorNode.nodeType === 1 ? s.anchorNode : s.anchorNode.parentElement) : null;
      if (nd && fontLabel) {
        let fam = '';
        try { fam = (document.queryCommandValue('fontName') || '').split(',')[0].replace(/['"]/g, '').trim().toLowerCase(); } catch (_) {}
        const hit = FONTS.find(([, stack]) => stack.split(',')[0].replace(/['"]/g, '').trim().toLowerCase() === fam);
        fontLabel.textContent = hit ? hit[0] : 'Font';
        fontLabel.style.fontFamily = hit ? hit[1] : '';
      }
      if (nd && sizeLabel) {
        if (typingSizePx) {
          sizeLabel.textContent = String(typingSizePx); // shows what typing will produce
        } else {
          let px = Math.round(parseFloat(getComputedStyle(nd).fontSize));
          if (px % 2) px += 1; // options are even-numbered
          sizeLabel.textContent = (px >= 6 && px <= 40) ? String(px) : 'Size';
        }
      }
    }
    document.addEventListener('selectionchange', () => {
      if (document.activeElement === area || area.contains(document.getSelection().anchorNode)) refresh();
    });
  }

  function renderChips(id) {
    const box = document.getElementById(`${id}-chips`);
    if (!box) return;
    const kb = (n) => n > 1048576 ? (n / 1048576).toFixed(1) + ' MB' : Math.ceil(n / 1024) + ' KB';
    box.innerHTML = attFiles.map((f, i) =>
      `<span class="att-chip">📎 ${esc(f.name)} <small style="opacity:.6">${kb(f.size)}</small>
        <button data-rm="${i}" title="Remove">✕</button></span>`).join('');
    box.querySelectorAll('button[data-rm]').forEach(b =>
      b.onclick = () => { attFiles.splice(Number(b.dataset.rm), 1); renderChips(id); });
  }

  const fileToB64 = (f) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(f);
  });

  async function collectAttachments() {
    const out = [];
    for (const f of attFiles) {
      out.push({ filename: f.name, content: await fileToB64(f), content_type: f.type || 'application/octet-stream' });
    }
    return out;
  }

  const wrapHtml = (inner) =>
    `<div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.55;color:#1c2430">${inner}</div>`;

  function editorContent(id) {
    const area = document.getElementById(id);
    const text = area.innerText.trim();
    const html = area.innerHTML.trim();
    const empty = !text && !area.querySelector('img');
    return { text, html: empty ? '' : wrapHtml(html), empty };
  }

  // ================= views =================
  function render() {
    const current = emails.find(e => e.id === sel);
    page.innerHTML = `
      <div class="inbox-tabs" id="tabs">
        ${TABS.map(t => `<button class="tab ${t.key === tab ? 'on' : ''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div class="inbox-toolbar">
        <button class="btn" id="tb-compose">✉ Compose</button>
        <button class="btn ghost" id="tb-refresh">Refresh</button>
        ${tab === 'trash' ? '<span class="hint">Items in Trash are deleted forever after 30 days.</span>' : ''}
        <span style="margin-left:auto; opacity:.65; font-size:.85rem" id="unread-note"></span>
      </div>
      <div class="inbox-wrap">
        <div class="card mail-list">
          ${emails.length === 0 ? `<div class="empty">${EMPTY_TEXT[tab]}</div>` : ''}
          ${emails.map(e => `
            <div class="mail-row ${e.read_at || e.direction === 'out' ? 'is-read' : ''} ${e.id === sel ? 'sel' : ''}" data-id="${e.id}">
              ${(tab === 'inbox' || tab === 'starred') ? `<button class="star-btn ${e.starred ? 'on' : ''}" data-star="${e.id}" title="${e.starred ? 'Unstar' : 'Star'}">${e.starred ? '★' : '☆'}</button>` : ''}
              <div class="rw">
                <div class="m-from">
                  <span>${e.read_at || e.direction === 'out' ? '' : '<span class="m-dot"></span>'}${rowMeta(e)}</span>
                  <span class="m-date">${fmt(e.folder === 'scheduled' ? e.scheduled_at : e.received_at)}</span>
                </div>
                <div class="m-subj">${esc(e.subject || '(no subject)')}</div>
              </div>
            </div>`).join('')}
        </div>
        <div class="card mail-view">
          ${composing ? composeHTML() : current ? viewHTML(current) : '<div class="empty">Select a message.</div>'}
        </div>
      </div>`;

    document.getElementById('tabs').querySelectorAll('.tab').forEach(b => b.onclick = () => {
      tab = b.dataset.tab; sel = null; composing = false; draft = null; attFiles = []; load();
    });
    document.getElementById('tb-compose').onclick = () => { composing = true; sel = null; draft = null; attFiles = []; render(); };
    document.getElementById('tb-refresh').onclick = load;
    updateUnread();
    page.querySelectorAll('.star-btn').forEach(b => b.onclick = async (ev) => {
      ev.stopPropagation();
      const e = emails.find(x => x.id === Number(b.dataset.star));
      if (e && await setFields(e.id, { starred: !e.starred })) { e.starred = !e.starred; render(); }
    });
    page.querySelectorAll('.mail-row').forEach(row => row.onclick = () => open(Number(row.dataset.id)));
    if (composing) wireCompose();
    else if (current) wireView(current);
  }

  async function updateUnread() {
    const { count } = await supabase.from('inbox_emails')
      .select('id', { count: 'exact', head: true })
      .eq('folder', 'inbox').is('read_at', null);
    const el = document.getElementById('unread-note');
    if (el) el.textContent = `${count ?? 0} unread`;
  }

  function actionsFor(e) {
    const a = [];
    if (e.direction === 'in' && e.folder === 'inbox') a.push('<button class="btn sm" id="mv-reply">Reply</button>');
    if (e.folder === 'inbox') a.push('<button class="btn ghost sm" id="mv-spam">Spam</button>');
    if (e.folder === 'spam') a.push('<button class="btn ghost sm" id="mv-notspam">Not spam</button>');
    if (e.folder === 'draft') a.push('<button class="btn sm" id="mv-edit">Edit draft</button>');
    if (e.folder === 'scheduled') a.push('<button class="btn ghost sm" id="mv-cancel-sched">Cancel schedule</button>');
    if (e.folder === 'trash') {
      a.push('<button class="btn sm" id="mv-restore">Restore</button>');
      a.push('<button class="btn ghost sm" id="mv-delete">Delete forever</button>');
    } else if (e.folder !== 'draft') {
      a.push('<button class="btn ghost sm" id="mv-trash">Trash</button>');
    } else {
      a.push('<button class="btn ghost sm" id="mv-delete">Delete draft</button>');
    }
    if (e.folder === 'inbox' && e.read_at && e.direction === 'in') {
      a.push('<button class="btn ghost sm" id="mv-unread">Keep unread</button>');
    }
    return a.join('');
  }

  function viewHTML(e) {
    const who = e.direction === 'out'
      ? `To <b>${esc(e.to_addr || '')}</b>`
      : `From <b>${esc(e.from_name || '')}</b> &lt;${esc(e.from_addr)}&gt;`;
    const when = e.folder === 'scheduled' ? `sends ${fmt(e.scheduled_at)}` : fmt(e.received_at);
    const atts = e.raw?.attachments?.length
      ? `<div class="mv-meta">📎 ${e.raw.attachments.map(esc).join(', ')}</div>` : '';
    return `
      <div class="mv-head">
        <h2 style="margin:0">${esc(e.subject || '(no subject)')}</h2>
        <div class="mv-meta">${who} · ${when}${e.folder === 'trash' && e.trashed_at ? ` · trashed ${fmt(e.trashed_at)}` : ''}</div>
        ${atts}
        <div class="mv-actions">${actionsFor(e)}</div>
      </div>
      <div class="mail-body" id="mail-body"></div>
      <div id="reply-box" style="display:none; margin-top:14px">
        ${editorHTML('rp-ed', 'Write your reply…')}
        <div style="display:flex; gap:8px; justify-content:flex-end">
          <button class="btn ghost sm" id="rp-cancel">Cancel</button>
          <button class="btn sm" id="rp-send">Send reply</button>
        </div>
      </div>`;
  }

  function composeHTML() {
    const d = draft || {};
    return `
      <div class="mv-head"><h2 style="margin:0">${d.id ? 'Edit draft' : 'New email'}</h2>
        <div class="mv-meta">Sends from support@umkcvsa.org</div></div>
      <div class="compose-fields">
        <input id="cp-to" type="email" placeholder="To (email address)" value="${esc(d.to_addr || '')}">
        <input id="cp-subj" type="text" placeholder="Subject" value="${esc(d.subject || '')}">
      </div>
      ${editorHTML('cp-ed', 'Write your message…')}
      <div class="sched-row" id="sched-row">
        <input id="cp-when" type="datetime-local" style="margin-bottom:0; width:auto; padding:8px 10px; border-radius:8px; border:1px solid rgba(128,128,128,.35); background:transparent; color:inherit">
        <span class="hint">local time</span>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:8px">
        <button class="btn ghost sm" id="cp-cancel">Cancel</button>
        <button class="btn ghost sm" id="cp-draft">Save draft</button>
        <button class="btn ghost sm" id="cp-sched-toggle">Schedule…</button>
        <button class="btn sm" id="cp-send">Send</button>
      </div>`;
  }

  // Themed rendering for HTML email (light "paper" card for color-styled mail in dark mode)
  function renderBody(e) {
    const host = document.getElementById('mail-body');
    if (!host) return;
    if (e.html_body) {
      const cs = getComputedStyle(document.body);
      const dark = (document.documentElement.dataset.theme || '').includes('dark')
        || matchMedia('(prefers-color-scheme: dark)').matches;
      const designed = /color\s*:|bgcolor=|background(?:-color)?\s*:/i.test(e.html_body);
      const canvas = designed && dark
        ? `color: #1c2430; background: #f4f5f7; border-radius: 10px;`
        : `color: ${cs.color}; background: transparent;`;
      const themed = `<style>
        :root { color-scheme: ${designed ? 'light' : dark ? 'dark' : 'light'}; }
        body { margin: 0; padding: ${designed && dark ? '12px' : '2px'};
          font-family: ${cs.fontFamily};
          font-size: .95rem; line-height: 1.55;
          ${canvas} }
        a { color: #3f7fbf; }
        blockquote { border-left: 3px solid rgba(128,128,128,.45);
          margin: 6px 0; padding-left: 10px; opacity: .8; }
        img { max-width: 100%; height: auto; }
        table { max-width: 100%; }
      </style>`;
      const f = document.createElement('iframe');
      f.setAttribute('sandbox', '');
      f.setAttribute('allowtransparency', 'true');
      f.srcdoc = themed + e.html_body;
      f.onload = () => {
        try { f.style.height = Math.min(f.contentDocument?.body?.scrollHeight + 24 || 340, 560) + 'px'; } catch (_) {}
      };
      host.style.whiteSpace = 'normal';
      host.replaceChildren(f);
    } else {
      host.style.whiteSpace = 'pre-wrap';
      host.textContent = e.text_body || '(empty message)';
    }
  }

  async function open(id) {
    const e = emails.find(x => x.id === id);
    if (e && e.folder === 'draft') { composing = true; draft = e; sel = null; attFiles = []; render(); return; }
    sel = id; composing = false; draft = null;
    render();
    if (e && !e.read_at && e.direction === 'in') {
      e.read_at = new Date().toISOString();
      await supabase.from('inbox_emails').update({ read_at: e.read_at }).eq('id', id);
      render();
    }
  }

  function wireView(e) {
    renderBody(e);
    const on = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
    on('mv-reply', () => {
      const box = document.getElementById('reply-box');
      if (box.style.display !== 'block') {
        box.style.display = 'block';
        wireEditor('rp-ed', { withAttachments: false });
      }
      document.getElementById('rp-ed').focus();
    });
    on('rp-cancel', () => { document.getElementById('reply-box').style.display = 'none'; });
    on('rp-send', async () => {
      const btn = document.getElementById('rp-send');
      const { text, html, empty } = editorContent('rp-ed');
      if (empty) return;
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        await send({
          to: e.from_addr,
          subject: /^re:/i.test(e.subject || '') ? e.subject : `Re: ${e.subject || ''}`,
          text, html, reply_to_id: e.id,
        });
        await load();
      } catch (err) { alert(err.message); btn.disabled = false; btn.textContent = 'Send reply'; }
    });
    on('mv-trash', async () => {
      if (await setFields(e.id, { folder: 'trash', trashed_at: new Date().toISOString() })) { sel = null; load(); }
    });
    on('mv-restore', async () => {
      const dest = e.direction === 'out' ? 'sent' : 'inbox';
      if (await setFields(e.id, { folder: dest, trashed_at: null })) { sel = null; load(); }
    });
    on('mv-delete', async () => {
      if (!confirm('Delete forever? This cannot be undone.')) return;
      const { error } = await supabase.from('inbox_emails').delete().eq('id', e.id);
      if (error) alert(error.message); else { sel = null; load(); }
    });
    on('mv-spam', async () => { if (await setFields(e.id, { folder: 'spam' })) { sel = null; load(); } });
    on('mv-notspam', async () => { if (await setFields(e.id, { folder: 'inbox' })) { sel = null; load(); } });
    on('mv-edit', () => { composing = true; draft = e; sel = null; attFiles = []; render(); });
    on('mv-cancel-sched', async () => {
      if (await setFields(e.id, { folder: 'draft', scheduled_at: null })) { sel = null; load(); }
    });
    on('mv-unread', async () => {
      if (await setFields(e.id, { read_at: null })) { e.read_at = null; sel = null; render(); updateUnread(); }
    });
  }

  function wireCompose() {
    wireEditor('cp-ed');
    // prefill from draft
    const area = document.getElementById('cp-ed');
    if (draft?.html_body) {
      // strip the outer wrapper div if present
      area.innerHTML = draft.html_body.replace(/^<div style="font-family[^>]*>([\s\S]*)<\/div>$/, '$1');
    } else if (draft?.text_body) {
      area.innerText = draft.text_body;
    }
    renderChips('cp-ed');

    const val = (id) => document.getElementById(id).value.trim();
    const on = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
    on('cp-cancel', () => { composing = false; draft = null; attFiles = []; render(); });
    on('cp-sched-toggle', () => {
      const row = document.getElementById('sched-row');
      row.classList.toggle('show');
      const sendBtn = document.getElementById('cp-send');
      sendBtn.textContent = row.classList.contains('show') ? 'Schedule send' : 'Send';
    });
    on('cp-draft', async () => {
      const btn = document.getElementById('cp-draft');
      btn.disabled = true; btn.textContent = 'Saving…';
      if (attFiles.length) alert('Heads up: attachments are not saved with drafts — re-attach before sending.');
      const { text, html } = editorContent('cp-ed');
      const fields = {
        to_addr: val('cp-to') || null, subject: val('cp-subj') || null,
        text_body: text || null, html_body: html || null,
      };
      let error;
      if (draft?.id) ({ error } = await supabase.from('inbox_emails').update(fields).eq('id', draft.id));
      else ({ error } = await supabase.from('inbox_emails').insert({
        ...fields, direction: 'out', folder: 'draft',
        from_addr: 'support@umkcvsa.org', sent_by: ctx.user.id,
        read_at: new Date().toISOString(),
      }));
      if (error) { alert(error.message); btn.disabled = false; btn.textContent = 'Save draft'; return; }
      composing = false; draft = null; attFiles = []; tab = 'draft'; load();
    });
    on('cp-send', async () => {
      const btn = document.getElementById('cp-send');
      const schedOn = document.getElementById('sched-row').classList.contains('show');
      const { text, html, empty } = editorContent('cp-ed');
      const payload = { to: val('cp-to'), subject: val('cp-subj'), text, html };
      if (draft?.id) payload.draft_id = draft.id;
      if (schedOn) {
        const when = document.getElementById('cp-when').value;
        if (!when) { alert('Pick a date and time.'); return; }
        if (attFiles.length) { alert('Attachments aren\'t supported on scheduled sends yet — send now, or remove them.'); return; }
        payload.schedule_at = new Date(when).toISOString();
      }
      if (!payload.to || !payload.subject || empty) { alert('Fill in recipient, subject, and message.'); return; }
      btn.disabled = true; btn.textContent = schedOn ? 'Scheduling…' : 'Sending…';
      try {
        if (attFiles.length) {
          btn.textContent = 'Attaching…';
          payload.attachments = await collectAttachments();
          btn.textContent = 'Sending…';
        }
        await send(payload);
        composing = false; draft = null; attFiles = [];
        tab = schedOn ? 'scheduled' : 'sent';
        load();
      } catch (err) {
        alert(err.message);
        btn.disabled = false; btn.textContent = schedOn ? 'Schedule send' : 'Send';
      }
    });
  }

  load();
  // light auto-refresh so new mail appears without a manual reload
  setInterval(() => { if (!composing) load(); }, 60_000);
</script>
</body>
</html>
