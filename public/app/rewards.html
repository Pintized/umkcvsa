<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<style>
  .pend-line { color: #e08a3d; font-weight: 600; font-size: .92rem; margin-top: 6px; }
  .pend-line .spendable { color: var(--muted); font-weight: 400; }
  .rd-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(128,128,128,.18); font-size: .9rem; flex-wrap: wrap; }
  .rd-row:last-child { border-bottom: none; }
  .rd-meta { color: var(--muted); font-size: .8rem; }
  .rd-row .spacer { margin-left: auto; }
  .st-pill { font-size: .72rem; padding: 2px 9px; border-radius: 99px; font-weight: 700; }
  .st-pill.pending { background: rgba(224,138,61,.16); color: #e08a3d; }
  .st-pill.completed { background: rgba(47,158,99,.15); color: #2f9e63; }
  .btn.small { padding: 6px 13px; font-size: .82rem; }
  .tile .redeem-btn { margin-top: 10px; }
  .left-badge {
    position: absolute; top: 13px; left: 13px;
    background: linear-gradient(140deg, #ff5f6d, #c8202f);
    color: #fff; font-weight: 800; font-size: .74rem; letter-spacing: .3px;
    border-radius: 999px; padding: 3px 11px;
    box-shadow: 0 2px 10px rgba(200,32,47,.45);
    animation: leftPulse 1.6s ease-in-out infinite;
  }
  @keyframes leftPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 2px 10px rgba(200,32,47,.45); }
    50% { transform: scale(1.08); box-shadow: 0 2px 16px rgba(200,32,47,.7); }
  }
  .left-badge.out { background: rgba(128,128,128,.35); color: #eee; animation: none; box-shadow: none; }
  .tile.soldout { opacity: .65; }
  .tile.soldout h3, .tile.soldout .pts { filter: grayscale(.4); }
</style>
</head>
<body>
<div class="loading" id="loading">Loading rewards…</div>
<script type="module">
  import { requireLogin } from '/app/shared/guard.js';
  import { renderShell } from '/app/shared/shell.js';
  import { supabase } from '/app/shared/supabase.js';

  const ctx = await requireLogin();
  document.getElementById('loading').remove();
  const page = renderShell(ctx, 'Rewards');

  const vnd = (n) => (n ?? 0).toLocaleString('vi-VN');
  const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const fmtWhen = (d) => new Date(d).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  const CANCEL_WINDOW_MS = 4 * 60 * 60 * 1000;

  let rewards = [], mine = [], pts = 0;

  async function load() {
    const [r, m, p] = await Promise.all([
      supabase.from('rewards').select('*').eq('active', true).order('point_cost'),
      supabase.from('reward_redemptions').select('*').eq('user_id', ctx.user.id).order('created_at', { ascending: false }),
      supabase.from('profiles').select('points').eq('id', ctx.user.id).single(),
    ]);
    rewards = r.data || [];
    mine = m.data || [];
    pts = p.data?.points ?? 0;
    render();
  }

  const pending = () => mine.filter(x => x.status === 'pending');
  const pendingSum = () => pending().reduce((s, x) => s + x.points_spent, 0);
  const spendable = () => pts - pendingSum();
  const cancelDeadline = (x) => new Date(x.created_at).getTime() + CANCEL_WINDOW_MS;
  const timeLeft = (x) => {
    const ms = cancelDeadline(x) - Date.now();
    if (ms <= 0) return null;
    const h = Math.floor(ms / 3600000), min = Math.ceil((ms % 3600000) / 60000);
    return h ? `${h}h ${min}m` : `${min}m`;
  };

  function render() {
    const pend = pendingSum();
    const spend = spendable();
    const pn = pending().length;
    const completed = mine.filter(x => x.status === 'completed').slice(0, 5);

    const tile = (r) => {
      const soldOut = r.stock === 0;
      const canAfford = spend >= r.point_cost && !soldOut;
      return `
        <div class="tile ${canAfford ? 'earned' : ''} ${soldOut ? 'soldout' : ''}">
          ${r.stock != null ? (soldOut
            ? '<span class="left-badge out">Sold out</span>'
            : `<span class="left-badge">🔥 ${r.stock} Left!</span>`) : ''}
          ${canAfford ? '<span class="earned-tag">Affordable</span>' : ''}
          <h3>🎁 ${esc(r.name)}</h3>
          <p>${esc(r.description || '')}</p>
          <span class="pts">${vnd(r.point_cost)} VND</span>
          ${r.category === 'clothing' ? `<div style="color:var(--muted); font-size:.78rem; margin-top:4px">Sizes: ${(r.sizes?.length ? r.sizes : ['XS','S','M','L','XL','XXL']).join(' · ')}</div>` : ''}
          <div><button class="btn small redeem-btn ${canAfford ? '' : 'ghost'}" data-redeem="${r.id}" ${soldOut ? 'disabled' : ''}>${soldOut ? 'Sold out' : 'Redeem'}</button></div>
        </div>`;
    };

    page.innerHTML = `
      <div class="card">
        <h2>Your balance</h2>
        <div class="stat-grid">
          <div class="stat">
            <div style="display:flex; align-items:baseline; gap:8px"><div class="num">${vnd(pts)}</div><div class="lbl" style="margin:0">VND</div></div>
            ${pend ? `<div class="pend-line">−${vnd(pend)} VND pending (${pn} redemption${pn > 1 ? 's' : ''})
              <span class="spendable">· ${vnd(spend)} VND spendable</span></div>` : ''}
          </div>
        </div>
        <p style="color:var(--muted); font-size:.88rem; margin-top:12px">
          Redeem below, then pick your item up from an officer — your VND is only deducted
          once they hand it over. You can cancel a redemption within <strong>4 hours</strong> of placing it.
        </p>
        <div class="notice" id="notice"></div>
      </div>
      ${mine.length ? `
      <div class="card">
        <h2>Your redemptions</h2>
        ${pending().map(x => {
          const left = timeLeft(x);
          return `
            <div class="rd-row">
              <span>🎁 <strong>${esc(x.reward_name)}</strong>${x.size ? ` <span class="rd-meta">(${esc(x.size)})</span>` : ''}</span>
              <span class="rd-meta">−${vnd(x.points_spent)} VND · requested ${fmtWhen(x.created_at)}</span>
              <span class="st-pill pending">pending pickup</span>
              <span class="spacer"></span>
              ${left
                ? `<span class="rd-meta">cancellable for ${left}</span><button class="btn ghost small" data-cancel="${x.id}">Cancel</button>`
                : '<span class="rd-meta">cancel window passed — ask an officer</span>'}
            </div>`;
        }).join('')}
        ${completed.map(x => `
          <div class="rd-row">
            <span>🎁 <strong>${esc(x.reward_name)}</strong>${x.size ? ` <span class="rd-meta">(${esc(x.size)})</span>` : ''}</span>
            <span class="rd-meta">−${vnd(x.points_spent)} VND · picked up ${fmtWhen(x.completed_at || x.created_at)}</span>
            <span class="st-pill completed">completed</span>
          </div>`).join('')}
      </div>` : ''}
      <div class="card">
        <h2>Reward catalog</h2>
        ${rewards.length
          ? `<div class="tile-grid">${rewards.map(tile).join('')}</div>`
          : '<p style="color:var(--muted)">No rewards available right now.</p>'}
      </div>`;

    const notice = page.querySelector('#notice');
    const say = (msg, cls) => {
      notice.textContent = msg; notice.className = `notice ${cls}`;
      notice.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    };

    const pickSize = (r) => new Promise((resolve) => {
      const sizes = r.sizes?.length ? r.sizes : ['XS', 'S', 'M', 'L', 'XL', 'XXL'];
      const back = document.createElement('div');
      back.className = 'modal-back';
      back.innerHTML = `
        <div class="modal pop">
          <h2>Pick a size</h2>
          <p style="color:var(--muted); font-size:.88rem; margin-bottom:12px">🎁 ${esc(r.name)}</p>
          <div class="field"><label>Size</label>
            <select id="sz-sel">${sizes.map(sz => `<option>${sz}</option>`).join('')}</select></div>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="sz-cancel">Cancel</button>
            <button type="button" class="btn" id="sz-ok">Continue</button>
          </div>
        </div>`;
      document.body.appendChild(back);
      const done = (v) => { back.remove(); resolve(v); };
      back.querySelector('#sz-cancel').onclick = () => done(null);
      back.querySelector('#sz-ok').onclick = () => done(back.querySelector('#sz-sel').value);
      back.addEventListener('click', (e) => { if (e.target === back) done(null); });
    });

    const confirmRedeem = (r, size) => new Promise((resolve) => {
      const back = document.createElement('div');
      back.className = 'modal-back';
      back.innerHTML = `
        <div class="modal pop">
          <h2>Redeem this reward?</h2>
          <p style="font-size:1rem; margin-bottom:6px">🎁 <strong>${esc(r.name)}</strong>${size ? ` <span style="color:var(--muted)">· size ${esc(size)}</span>` : ''}</p>
          <p style="color:var(--gold, #e0b45c); font-weight:700; margin-bottom:12px">${vnd(r.point_cost)} VND</p>
          <p style="color:var(--muted); font-size:.88rem; line-height:1.5; margin-bottom:12px">
            An officer will complete this when they hand you the item —
            only then is the VND deducted from your balance.</p>
          <div style="display:flex; gap:8px; align-items:flex-start; font-size:.82rem; line-height:1.45;
              color:#e0b45c; background:rgba(224,180,92,.1); border:1px solid rgba(224,180,92,.35);
              border-radius:10px; padding:8px 11px; margin-bottom:6px">
            <span>⏳</span>
            <span>You can cancel this redemption for up to <b>4 hours</b>.
            After that, only an officer can cancel it for you.</span>
          </div>
          <div class="row-btns">
            <button type="button" class="btn ghost" id="cf-cancel">Never mind</button>
            <button type="button" class="btn" id="cf-ok">Redeem</button>
          </div>
        </div>`;
      document.body.appendChild(back);
      const done = (v) => { back.remove(); resolve(v); };
      back.querySelector('#cf-cancel').onclick = () => done(false);
      back.querySelector('#cf-ok').onclick = () => done(true);
      back.addEventListener('click', (e) => { if (e.target === back) done(false); });
    });

    page.querySelectorAll('[data-redeem]').forEach(b => b.addEventListener('click', async () => {
      const r = rewards.find(x => x.id === +b.dataset.redeem);
      if (!r) return;
      if (r.stock === 0) { say(`"${r.name}" is sold out.`, 'error'); return; }
      if (r.point_cost > spendable()) {
        say(pendingSum() && r.point_cost <= pts
          ? `Insufficient balance: you have ${vnd(spendable())} VND spendable (${vnd(pts)} balance − ${vnd(pendingSum())} pending). Cancel a pending redemption above to free up VND.`
          : `Insufficient balance: "${r.name}" costs ${vnd(r.point_cost)} VND and you have ${vnd(spendable())} VND spendable.`, 'error');
        return;
      }
      let size = null;
      if (r.category === 'clothing') {
        size = await pickSize(r);
        if (!size) return;
      }
      if (!await confirmRedeem(r, size)) return;
      const { error } = await supabase.rpc('request_reward', { reward: r.id, size });
      if (error) { say(error.message, 'error'); return; }
      await load();
      page.querySelector('#notice').textContent = `Redeemed "${r.name}" — show this page to an officer to pick it up!`;
      page.querySelector('#notice').className = 'notice ok';
    }));

    page.querySelectorAll('[data-cancel]').forEach(b => b.addEventListener('click', async () => {
      const x = mine.find(y => y.id === +b.dataset.cancel);
      if (!x) return;
      if (!confirm(`Cancel your redemption of "${x.reward_name}"? The ${vnd(x.points_spent)} VND hold will be released.`)) return;
      const { error } = await supabase.rpc('cancel_redemption', { redemption: x.id });
      if (error) { say(error.message, 'error'); return; }
      await load();
      page.querySelector('#notice').textContent = `Cancelled "${x.reward_name}".`;
      page.querySelector('#notice').className = 'notice ok';
    }));
  }

  await load();
</script>
</body>
</html>
