<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up | UMKC VSA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="/app/shared/theme-init.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="/">
      <img src="/assets/img/logo-128.png" alt="UMKC VSA logo">
      <span>UMKC VSA</span>
    </a>
    <h1>Join UMKC VSA</h1>
    <p class="sub">Create your member account.</p>
    <div class="notice" id="notice"></div>
    <form id="signup-form">
      <div class="field-row">
        <div class="field">
          <label for="first">First name</label>
          <input type="text" id="first" autocomplete="given-name" required>
        </div>
        <div class="field">
          <label for="last">Last name</label>
          <input type="text" id="last" autocomplete="family-name" required>
        </div>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" minlength="8" required>
      </div>
      <button class="btn" id="submit" type="submit">Create account</button>
    </form>
    <p class="auth-alt">Already a member? <a href="/app/login.html">Log in</a></p>
  </div>
</div>
<script type="module">
  import { supabase } from '/app/shared/supabase.js';

  const notice = document.getElementById('notice');
  const say = (msg, cls) => { notice.textContent = msg; notice.className = `notice ${cls}`; };

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit');
    btn.disabled = true; btn.textContent = 'Creating account…';
    const first = document.getElementById('first').value.trim();
    const last = document.getElementById('last').value.trim();
    const { data, error } = await supabase.auth.signUp({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      options: {
        data: { first_name: first, last_name: last },
        emailRedirectTo: 'https://umkcvsa.org/app/verified.html',
      },
    });
    if (error) {
      say(error.message, 'error');
      btn.disabled = false; btn.textContent = 'Create account';
      return;
    }
    if (data.session) {
      // Email confirmation disabled server-side -> signed in immediately
      location.replace('/app/');
      return;
    }
    say('Account created! Check your email for a confirmation link, then log in.', 'ok');
    document.getElementById('signup-form').style.display = 'none';
  });
</script>
</body>
</html>
